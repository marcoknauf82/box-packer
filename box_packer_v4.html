<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Aachen Move — Box Packer</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#534AB7;--pl:#EEEDFE;--pd:#3C3489;
  --g:#1D9E75;--gl:#E1F5EE;--gd:#0F6E56;
  --a:#BA7517;--al:#FAEEDA;--ad:#854F0B;
  --r:#E24B4A;--rl:#FCEBEB;--rd:#A32D2D;
  --border:#e0ddf7;--surface:#ffffff;--bg:#f5f4fc;
  --text:#1a1a2e;--muted:#6b6b8a;--faint:#a0a0b8;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;color:var(--text);background:var(--bg);min-height:100vh;font-size:15px}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
.app{max-width:520px;margin:0 auto;padding:1rem 1rem 3rem}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:.75rem 0 1rem;border-bottom:0.5px solid var(--border);margin-bottom:1.25rem}
.top-title{font-size:16px;font-weight:600;color:var(--pd)}
.top-sub{font-size:11px;color:var(--muted)}
.steps-nav{display:flex;gap:4px;margin-bottom:1.5rem}
.step-dot{flex:1;height:3px;border-radius:2px;background:var(--border);transition:background .3s}
.step-dot.done{background:var(--p)}.step-dot.active{background:var(--p);opacity:.55}
.step-header{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--p);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.step-title{font-size:17px;font-weight:600}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:1rem 1.125rem;margin-bottom:1rem}
.tier-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.tier-btn{padding:10px 4px;border:1.5px solid var(--border);border-radius:8px;background:none;font-size:12px;font-weight:600;color:var(--muted);text-align:center;transition:all .15s;line-height:1.5}
.tier-btn.sel-A{border-color:var(--g);background:var(--gl);color:var(--gd)}
.tier-btn.sel-B{border-color:var(--a);background:var(--al);color:var(--ad)}
.tier-btn.sel-C{border-color:var(--p);background:var(--pl);color:var(--pd)}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.field input,.field textarea{width:100%;padding:10px 12px;border:0.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:14px;transition:border-color .15s}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--p)}
.upload-zone{border:1.5px dashed var(--border);border-radius:10px;padding:2rem 1rem;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:1rem;background:var(--surface)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--p);background:var(--pl)}
.upload-text{font-size:14px;color:var(--muted);margin-top:.5rem}
.upload-sub{font-size:12px;color:var(--faint);margin-top:4px}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.photo-thumb{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;border:0.5px solid var(--border)}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-del{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.65);color:#fff;border:none;font-size:15px;display:flex;align-items:center;justify-content:center;padding:0}
.add-photo-cell{aspect-ratio:1;border:1.5px dashed var(--border);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:var(--surface);transition:all .15s}
.add-photo-cell:hover{border-color:var(--p);background:var(--pl)}
.btn{width:100%;padding:13px;border-radius:9px;font-size:15px;font-weight:600;border:none;transition:all .15s;cursor:pointer}
.btn-primary{background:var(--p);color:#fff}.btn-primary:hover{background:var(--pd)}
.btn-primary:disabled{background:#ccc;cursor:not-allowed}
.btn-secondary{background:var(--surface);color:var(--text);border:0.5px solid var(--border)}
.btn-secondary:hover{border-color:var(--p);color:var(--p)}
.btn-success{background:var(--g);color:#fff}.btn-success:hover{background:var(--gd)}
.btn-sm{padding:7px 14px;font-size:13px;border-radius:7px;width:auto}
.btn-row{display:flex;gap:8px;margin-top:.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite}
.item-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem}
.item-row{display:flex;align-items:center;gap:8px;padding:10px 11px;border:0.5px solid var(--border);border-radius:8px;background:var(--surface)}
.item-row.removed{opacity:.4;background:var(--bg)}
.item-text{flex:1;font-size:14px;color:var(--text);outline:none;min-width:0;word-break:break-word}
.item-del{width:28px;height:28px;border-radius:6px;border:0.5px solid var(--border);background:none;color:var(--muted);font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;transition:all .15s}
.item-del:hover{background:var(--rl);border-color:var(--r);color:var(--rd)}
.item-restore{font-size:12px;padding:5px 10px;border:0.5px solid var(--g);border-radius:5px;background:none;color:var(--gd);white-space:nowrap}
.add-item-row{display:flex;gap:8px;margin-bottom:1rem}
.add-item-row input{flex:1;padding:10px 12px;border:0.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:14px}
.add-item-row input:focus{outline:none;border-color:var(--p)}
.clarify-card{background:var(--pl);border:0.5px solid #CECBF6;border-radius:10px;padding:.875rem 1rem;margin-bottom:1rem}
.clarify-q{font-size:14px;font-weight:600;color:var(--pd);margin-bottom:10px}
.clarify-opts{display:flex;flex-direction:column;gap:6px}
.clarify-opt{padding:10px 12px;border:1.5px solid #CECBF6;border-radius:8px;background:var(--surface);color:var(--text);font-size:14px;text-align:left;transition:all .15s;cursor:pointer}
.clarify-opt:hover,.clarify-opt.sel{border-color:var(--p);background:var(--pl);color:var(--pd);font-weight:600}
.meta-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.status-bar{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:1rem;line-height:1.5}
.status-ok{background:var(--gl);color:var(--gd);border:0.5px solid #9FE1CB}
.status-err{background:var(--rl);color:var(--rd);border:0.5px solid #F7C1C1}
.status-info{background:var(--pl);color:var(--pd);border:0.5px solid #CECBF6}
.status-warn{background:var(--al);color:var(--ad);border:0.5px solid #FAC775}
.label-preview{border:1px solid #ccc;border-radius:6px;overflow:hidden;background:#fff;color:#111;margin-bottom:1rem}
.lp-stripe{height:10px}.lp-body{display:flex;padding:10px 12px;gap:10px}
.lp-main{flex:1;display:flex;flex-direction:column;justify-content:space-between;min-width:0}
.lp-id{font-family:monospace;font-size:28px;font-weight:700;line-height:1;color:#111}
.lp-badge{display:inline-block;margin-top:4px;font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:3px}
.lp-desc{font-size:10px;font-weight:600;color:#222;line-height:1.3;margin-top:5px}
.lp-items{font-family:monospace;font-size:7px;color:#666;line-height:1.6;margin-top:4px}
.lp-bottom{margin-top:8px;padding-top:5px;border-top:.5px solid #e8e8e8;display:flex;justify-content:space-between;align-items:flex-end}
.lp-dest{font-size:8px;font-weight:700;color:#333;text-transform:uppercase;letter-spacing:.04em}
.lp-tag{font-family:monospace;font-size:7px;color:#aaa}
.lp-divider{width:1px;background:#eee;flex-shrink:0;align-self:stretch;margin:0 2px}
.lp-qr-side{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;flex-shrink:0;width:76px}
.lp-qr-side canvas{border:1px solid #e5e5e5;border-radius:3px;display:block}
.lp-qr-hint{font-size:7px;color:#999;text-align:center;line-height:1.3}
.registry{margin-top:2rem;padding-top:1.25rem;border-top:0.5px solid var(--border)}
.reg-header{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.reg-counts{display:flex;gap:10px}
.reg-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:0.5px solid var(--border);border-radius:8px;margin-bottom:5px;background:var(--surface)}
.reg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.reg-id{font-family:monospace;font-size:12px;font-weight:600;min-width:42px;color:var(--pd)}
.reg-desc{font-size:12px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.reg-n{font-size:11px;color:var(--faint)}
.info-box{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:.75rem 1rem;font-size:13px;color:var(--muted);margin-bottom:1rem;line-height:1.6}
.err-detail{background:#fff0f0;border:0.5px solid #F7C1C1;border-radius:8px;padding:10px 12px;font-size:11px;font-family:monospace;color:#A32D2D;margin-top:8px;word-break:break-all;line-height:1.6}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface);font-size:15px;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s}
.google-btn:hover{border-color:var(--p);background:var(--pl)}
.google-btn svg{flex-shrink:0}
.auth-badge{display:flex;align-items:center;gap:6px;font-size:12px;padding:5px 10px;border-radius:6px;background:var(--gl);color:var(--gd);border:0.5px solid #9FE1CB}
.settings-row{display:flex;align-items:center;gap:8px;padding:.5rem 0;border-bottom:0.5px solid var(--border);margin-bottom:.5rem}
.settings-label{font-size:13px;color:var(--muted);flex:1}
.key-input{font-family:monospace;font-size:12px;letter-spacing:.05em}
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div><div class="top-title">Box packer</div><div class="top-sub">Aachen move · June 2026</div></div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      <div id="top-stats" style="font-size:12px;color:var(--muted);text-align:right"></div>
      <div id="auth-indicator"></div>
    </div>
  </div>
  <div id="root"></div>
</div>

<script>
const SHEET_ID = "1UHZhKhg-BrEej4P_phQvJY-J2kefZGMo";
const SHEET_GID = "436882718";
const SHEET_URL = "https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/edit?gid="+SHEET_GID;
const GOOGLE_CLIENT_ID = "525707917202-a5rasrh9gv5qk0gd9rcmijor5ma790dm.apps.googleusercontent.com";
const SCOPES = "https://www.googleapis.com/auth/spreadsheets";
const REGISTRY_SHEET = "Box Registry";
const ITEMS_SHEET = "Item Detail";

const TIER = {
  A:{stripe:"#1D9E75",bb:"#E1F5EE",bt:"#0F6E56",lbl:"Tier A · Daily life",dot:"#1D9E75",name:"Daily life"},
  B:{stripe:"#BA7517",bb:"#FAEEDA",bt:"#854F0B",lbl:"Tier B · Karting gear",dot:"#BA7517",name:"Karting gear"},
  C:{stripe:"#534AB7",bb:"#EEEDFE",bt:"#3C3489",lbl:"Tier C · Long-term storage",dot:"#534AB7",name:"Storage"},
};

const counters = {A:0,B:0,C:1};
let googleToken = null;
let googleUser = null;

let S = {
  step:0, tier:"C", dest:"", desc:"", fragile:false,
  photos:[], items:[], removed:[],
  clarifications:[], clarifyIdx:0,
  boxId:"", sheetResult:"",
  registry:[{id:"C-01",tier:"C",desc:"Books — mixed + household",dest:"Marco's office",count:15}],
};

function getApiKey(){return localStorage.getItem("anthropic_key")||"";}
function saveApiKey(k){localStorage.setItem("anthropic_key",k);}

const root = document.getElementById("root");
function q(s){return document.querySelector(s);}
function qq(s){return Array.from(document.querySelectorAll(s));}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function chunkItems(items,max){
  const lines=[];let line="";
  items.forEach(item=>{
    const seg=line?" · "+item:item;
    if((line+seg).length>max&&line){lines.push(line);line=item;}
    else line+=seg;
  });
  if(line)lines.push(line);
  return lines;
}
function updateTopStats(){
  const ca={A:0,B:0,C:0};S.registry.forEach(b=>ca[b.tier]++);
  const el=document.getElementById("top-stats");
  if(el)el.innerHTML=`${S.registry.length} boxes&nbsp; <span style="color:#0F6E56">A:${ca.A}</span> <span style="color:#854F0B">B:${ca.B}</span> <span style="color:#3C3489">C:${ca.C}</span>`;
  const ai=document.getElementById("auth-indicator");
  if(ai){
    if(googleUser){
      ai.innerHTML=`<div class="auth-badge"><svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="6" fill="#1D9E75"/><path d="M3 6l2 2 4-4" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>${esc(googleUser.split("@")[0])}</div>`;
    } else {
      ai.innerHTML="";
    }
  }
}

function nav(){
  return '<div class="steps-nav">'+[0,1,2,3,4].map(i=>
    `<div class="step-dot ${i<S.step?"done":i===S.step?"active":""}"></div>`
  ).join("")+"</div>";
}
function r(){root.innerHTML=view();bind();updateTopStats();}
function view(){return nav()+[v0,v1,v2,v3,v4][S.step]()+vreg();}

/* ── Step 0: Setup ── */
function v0(){
  const hasKey = !!getApiKey();
  return `
  <div class="step-header"><div class="step-num">1</div><div class="step-title">Box setup</div></div>
  ${!hasKey?`<div class="card">
    <div style="font-size:13px;font-weight:600;color:var(--pd);margin-bottom:8px">Anthropic API key</div>
    <div class="field" style="margin-bottom:8px">
      <input id="api-key-input" class="key-input" type="password" placeholder="sk-ant-..." autocomplete="off">
    </div>
    <button class="btn btn-primary" id="btn-save-key" style="margin-bottom:4px">Save key</button>
    <div style="font-size:11px;color:var(--faint);margin-top:4px">Saved locally on this device only. Never sent anywhere except Anthropic.</div>
  </div>`:`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding:8px 12px;background:var(--gl);border-radius:8px;border:0.5px solid #9FE1CB">
    <span style="font-size:13px;color:var(--gd)">API key saved</span>
    <button class="btn-sm btn-secondary" id="btn-clear-key" style="font-size:11px;padding:4px 10px;border-radius:5px;border:0.5px solid var(--border);background:none;color:var(--muted)">Change</button>
  </div>`}
  <div class="card">
    <div class="tier-row">
      ${["A","B","C"].map(t=>`<button class="tier-btn${S.tier===t?" sel-"+t:""}" id="tb-${t}">
        <div style="font-size:16px;font-weight:700">${t}</div>
        <div style="font-size:10px;font-weight:400;margin-top:2px">${TIER[t].name}</div>
      </button>`).join("")}
    </div>
    <div class="field">
      <label>Destination room in Aachen</label>
      <input id="f-dest" value="${esc(S.dest)}" placeholder="e.g. Marco's office, Basement, Kids room">
    </div>
    <div class="field">
      <label>Description hint (optional)</label>
      <input id="f-desc" value="${esc(S.desc)}" placeholder="e.g. Winter clothes, Kitchen appliances">
    </div>
    <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer;margin-top:4px">
      <input type="checkbox" id="f-fragile" ${S.fragile?"checked":""} style="width:16px;height:16px;accent-color:#534AB7">
      Mark as fragile
    </label>
  </div>
  <div style="margin-bottom:1rem">
    ${googleUser
      ? `<div class="status-bar status-ok" style="margin-bottom:8px">Google Sheets connected as ${esc(googleUser)}</div>`
      : `<button class="google-btn" id="btn-google-auth">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.826.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z"/></svg>
          Connect Google Sheets
        </button>`}
  </div>
  <button class="btn btn-primary" id="btn-next0" ${(!S.dest||!hasKey)?"disabled":""}>Next — add photos</button>`;
}

/* ── Step 1: Photos ── */
function v1(){
  const hp=S.photos.length>0;
  return`
  <div class="step-header"><div class="step-num">2</div><div class="step-title">Photos of box contents</div></div>
  <div class="info-box">Shoot straight down from above. Multiple layers = one photo per layer. Up to 4 photos.</div>
  ${hp?`<div class="photo-grid">
    ${S.photos.map((p,i)=>`<div class="photo-thumb"><img src="${p}"><button class="photo-del" data-i="${i}">×</button></div>`).join("")}
    ${S.photos.length<4?`<div class="add-photo-cell" id="add-more"><div style="font-size:24px;color:#aaa">+</div><div style="font-size:11px;color:#aaa;margin-top:4px">Add</div></div>`:""}
  </div>`:`<div class="upload-zone" id="drop-zone">
    <svg width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="#aaa" stroke-width="1.5" style="display:block;margin:0 auto">
      <rect x="4" y="10" width="32" height="24" rx="3"/><circle cx="20" cy="22" r="6"/>
      <path d="M14 10V8a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2"/>
    </svg>
    <div class="upload-text">Tap to take photo or choose file</div>
    <div class="upload-sub">Up to 4 images · JPG or PNG</div>
  </div>`}
  <input type="file" id="file-input" accept="image/*" multiple capture="environment" style="display:none">
  <div class="btn-row">
    <button class="btn btn-secondary" id="btn-back1" style="flex:1">Back</button>
    <button class="btn btn-primary" id="btn-analyze" style="flex:2" ${!hp?"disabled":""}>Analyze photos</button>
  </div>`;
}

/* ── Step 2: Review ── */
function v2(){
  const active=S.items.filter((_,i)=>!S.removed.includes(i));
  const cur=S.clarifications[S.clarifyIdx];
  return`
  <div class="step-header"><div class="step-num">3</div><div class="step-title">Review items (${active.length})</div></div>
  ${cur?`<div class="clarify-card">
    <div class="clarify-q">${esc(cur.question)}</div>
    <div class="clarify-opts">${cur.options.map((o,i)=>`<button class="clarify-opt" data-ci="${S.clarifyIdx}" data-oi="${i}">${esc(o)}</button>`).join("")}</div>
  </div>`:""}
  <div class="item-list">
    ${S.items.map((item,i)=>`
    <div class="item-row${S.removed.includes(i)?" removed":""}">
      <span class="item-text"${!S.removed.includes(i)?` contenteditable="true" data-idx="${i}" style="outline:none"`:""} >${esc(item)}</span>
      ${S.removed.includes(i)
        ?`<button class="item-restore" data-ri="${i}">Restore</button>`
        :`<button class="item-del" data-di="${i}">×</button>`}
    </div>`).join("")}
  </div>
  <div class="add-item-row">
    <input id="new-item" placeholder="Add missing item…">
    <button class="btn btn-secondary btn-sm" id="btn-add">Add</button>
  </div>
  <div class="meta-row">
    <div class="field" style="margin:0"><label>Description</label><input id="f-desc2" value="${esc(S.desc)}" placeholder="Box description"></div>
    <div class="field" style="margin:0"><label>Destination</label><input id="f-dest2" value="${esc(S.dest)}"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-secondary" id="btn-back2" style="flex:1">Back</button>
    <button class="btn btn-primary" id="btn-confirm" style="flex:2">Confirm — save to sheet</button>
  </div>`;
}

/* ── Step 3: Saving ── */
function v3(){
  return`

/* ── Registry ── */
function vreg(){
  const rr=S.registry;if(!rr.length)return"";
  const ca={A:0,B:0,C:0};rr.forEach(b=>ca[b.tier]++);
  return`<div class="registry">
  <div class="reg-header"><span>Registry (${rr.length})</span>
    <div class="reg-counts"><span style="color:#0F6E56">A:${ca.A}</span><span style="color:#854F0B">B:${ca.B}</span><span style="color:#3C3489">C:${ca.C}</span></div>
  </div>
  ${[...rr].reverse().slice(0,8).map(b=>`<div class="reg-item">
    <div class="reg-dot" style="background:${TIER[b.tier].dot}"></div>
    <div class="reg-id">${b.id}</div><div class="reg-desc">${esc(b.desc)}</div><div class="reg-n">${b.count}</div>
  </div>`).join("")}

/* ── Event binding ── */
function bind(){
  // Step 0
  q("#btn-save-key")?.addEventListener("click",()=>{
    const v=(q("#api-key-input")?.value||"").trim();
    if(v.startsWith("sk-ant-")){saveApiKey(v);r();}
    else toast("Key should start with sk-ant-");
  });
  q("#btn-clear-key")?.addEventListener("click",()=>{localStorage.removeItem("anthropic_key");r();});
  q("#btn-next0")?.addEventListener("click",()=>{if(S.dest&&getApiKey()){S.step=1;r();}});
  q("#f-dest")?.addEventListener("input",e=>{S.dest=e.target.value;const b=q("#btn-next0");if(b)b.disabled=!S.dest||!getApiKey();});
  q("#f-desc")?.addEventListener("input",e=>S.desc=e.target.value);
  q("#f-fragile")?.addEventListener("change",e=>S.fragile=e.target.checked);
  ["A","B","C"].forEach(t=>q("#tb-"+t)?.addEventListener("click",()=>{S.tier=t;r();}));
  q("#btn-google-auth")?.addEventListener("click",startGoogleAuth);
  // Step 1
  q("#btn-back1")?.addEventListener("click",()=>{S.step=0;r();});
  q("#btn-analyze")?.addEventListener("click",analyze);
  q("#drop-zone")?.addEventListener("click",()=>q("#file-input").click());
  q("#add-more")?.addEventListener("click",()=>q("#file-input").click());
  q("#file-input")?.addEventListener("change",e=>handleFiles(e.target.files));
  qq(".photo-del").forEach(b=>b.addEventListener("click",()=>{const i=+b.dataset.i;S.photos.splice(i,1);r();}));
  const dz=q("#drop-zone");
  if(dz){dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("drag");});dz.addEventListener("dragleave",()=>dz.classList.remove("drag"));dz.addEventListener("drop",e=>{e.preventDefault();dz.classList.remove("drag");handleFiles(e.dataTransfer.files);});}
  // Step 2
  q("#btn-back2")?.addEventListener("click",()=>{S.step=1;r();});
  q("#btn-confirm")?.addEventListener("click",confirmBox);
  q("#btn-add")?.addEventListener("click",addItem);
  q("#new-item")?.addEventListener("keydown",e=>{if(e.key==="Enter")addItem();});
  q("#f-desc2")?.addEventListener("input",e=>S.desc=e.target.value);
  q("#f-dest2")?.addEventListener("input",e=>S.dest=e.target.value);
  qq("[data-di]").forEach(b=>b.addEventListener("click",()=>{S.removed.push(+b.dataset.di);r();}));
  qq("[data-ri]").forEach(b=>b.addEventListener("click",()=>{S.removed=S.removed.filter(x=>x!==+b.dataset.ri);r();}));
  qq("[data-ci]").forEach(b=>b.addEventListener("click",()=>{S.clarifyIdx=+b.dataset.ci+1;r();}));
  qq("[data-idx]").forEach(el=>el.addEventListener("input",e=>{S.items[+el.dataset.idx]=e.target.innerText;}));
  // Step 4
  q("#btn-dl")?.addEventListener("click",downloadLabel);
  q("#btn-next-box")?.addEventListener("click",nextBox);
  if(S.step===4)setTimeout(drawQR,50);
}

/* ── Google OAuth ── */
function startGoogleAuth(){
  if(!window.google){toast("Google Sign-In library not loaded yet — try again in a moment");return;}
  const client=google.accounts.oauth2.initTokenClient({
    client_id:GOOGLE_CLIENT_ID,
    scope:SCOPES,
    callback:(resp)=>{
      if(resp.error){toast("Google auth failed: "+resp.error);return;}
      googleToken=resp.access_token;
      fetchGoogleUserInfo();
    }
  });
  client.requestAccessToken();
}

async function fetchGoogleUserInfo(){
  try{
    const resp=await fetch("https://www.googleapis.com/oauth2/v3/userinfo",{headers:{Authorization:"Bearer "+googleToken}});
    const data=await resp.json();
    googleUser=data.email||data.name||"connected";
    toast("Google Sheets connected");
    r();
  }catch(e){googleUser="connected";r();}
}

/* ── Write to Google Sheets ── */
async function writeToSheet(){
  if(!googleToken){S.sheetResult="skip";S.step=4;r();setTimeout(drawQR,50);return;}
  const active=S.items.filter((_,i)=>!S.removed.includes(i));
  const today=new Date().toLocaleDateString("en-GB");
  try{
    // Append to Box Registry
    const regRow=[[S.boxId,S.tier,S.desc,S.dest,active.length,S.fragile?"Yes":"No",S.boxId+" items in Item Detail tab",today,SHEET_URL+"&box="+encodeURIComponent(S.boxId)]];
    await sheetsAppend(REGISTRY_SHEET,regRow);
    // Append to Item Detail
    const itemRows=active.map((item,i)=>[S.boxId,i+1,getCategory(item),item,1,""]);
    if(itemRows.length)await sheetsAppend(ITEMS_SHEET,itemRows);
    S.sheetResult="ok";
  }catch(e){
    S.sheetResult=e.message||"unknown error";
  }
  S.step=4;r();setTimeout(drawQR,50);
}

async function sheetsAppend(sheetName,values){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(sheetName)}!A1:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`;
  const resp=await fetch(url,{
    method:"POST",
    headers:{"Authorization":"Bearer "+googleToken,"Content-Type":"application/json"},
    body:JSON.stringify({values})
  });
  if(!resp.ok){const e=await resp.text();throw new Error(resp.status+": "+e.slice(0,150));}
  return resp.json();
}

function getCategory(item){
  const i=item.toLowerCase();
  if(i.includes("book")||i.includes("novel")||i.includes("guide")||["harry","speed secrets","perfect corner","rya","fodor"].some(k=>i.includes(k)))return"Books";
  if(i.includes("kart")||i.includes("helmet")||i.includes("glove")||i.includes("rib")||i.includes("engine")||i.includes("tool"))return"Karting";
  if(i.includes("cloth")||i.includes("shirt")||i.includes("jacket")||i.includes("shoe")||i.includes("boot")||i.includes("dress"))return"Clothing";
  if(i.includes("yeti")||i.includes("mug")||i.includes("cup")||i.includes("plate")||i.includes("bowl")||i.includes("kitchen"))return"Kitchen";
  if(i.includes("plush")||i.includes("toy")||i.includes("game")||i.includes("lego"))return"Kids / Toys";
  return"Household";
}

/* ── File handling ── */
function handleFiles(files){
  const slots=4-S.photos.length;
  Array.from(files).slice(0,slots).forEach(file=>{
    compressImage(file,1200,0.82).then(dataUrl=>{S.photos.push(dataUrl);r();});
  });
}

function compressImage(file,maxPx,quality){
  return new Promise(resolve=>{
    const rd=new FileReader();
    rd.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>maxPx||h>maxPx){
          if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}
          else{w=Math.round(w*maxPx/h);h=maxPx;}
        }
        const cv=document.createElement("canvas");
        cv.width=w;cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        resolve(cv.toDataURL("image/jpeg",quality));
      };
      img.src=e.target.result;
    };
    rd.readAsDataURL(file);
  });
}

/* ── Analyze photos ── */
async function analyze(){
  S.step=2;S.items=[];S.removed=[];S.clarifications=[];S.clarifyIdx=0;
  root.innerHTML=nav()+`
  <div class="step-header"><div class="step-num">3</div><div class="step-title">Analyzing photos…</div></div>
  <div style="text-align:center;padding:3rem 1rem;color:var(--muted)">
    <div style="width:36px;height:36px;border:3px solid #CECBF6;border-top-color:#534AB7;border-radius:50%;margin:0 auto 1rem;animation:spin .7s linear infinite"></div>
    Analyzing ${S.photos.length} photo${S.photos.length>1?"s":""}…<br>
    <span style="font-size:12px;margin-top:6px;display:block">Usually takes 10–20 seconds</span>
  </div>`;
  try{
    const imgContent=S.photos.map(url=>{
      const [meta,data]=url.split(",");
      const mt=meta.match(/:(.*?);/)[1];
      return{type:"image",source:{type:"base64",media_type:mt,data}};
    });
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":getApiKey(),
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true",
      },
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1200,
        system:`You are a moving box inventory assistant. Analyze photos of box contents carefully.
Return ONLY a valid JSON object with these exact keys:
- "items": array of specific item name strings. Be precise: include brand names if visible, full book titles and authors if readable.
- "desc": short 4-8 word description of the box contents
- "clarifications": array of up to 2 objects with "question" (string) and "options" (array of 3-4 short strings), for anything genuinely uncertain
- "fragile": boolean
No markdown, no explanation, only the JSON object.`,
        messages:[{role:"user",content:[
          ...imgContent,
          {type:"text",text:`Analyze these ${S.photos.length} photo(s). Destination: ${S.dest}${S.desc?" | Context: "+S.desc:""}. List every visible item. Be specific.`}
        ]}]
      })
    });
    if(!resp.ok){const e=await resp.text();throw new Error(`API ${resp.status}: ${e.slice(0,200)}`);}
    const data=await resp.json();
    const raw=data.content[0].text.trim().replace(/^```json|^```|```$/gm,"").trim();
    const parsed=JSON.parse(raw);
    S.items=parsed.items||[];
    S.clarifications=parsed.clarifications||[];
    if(parsed.desc&&!S.desc)S.desc=parsed.desc;
    if(parsed.fragile)S.fragile=true;
  }catch(err){
    S.items=[];
    root.innerHTML=nav()+`
    <div class="step-header"><div class="step-num">3</div><div class="step-title">Analysis failed</div></div>
    <div class="status-bar status-err">Could not analyze photos — add items manually below.</div>
    <div class="err-detail">${esc(err.message)}</div>
    <div class="item-list"></div>
    <div class="add-item-row"><input id="new-item" placeholder="Add item manually…"><button class="btn btn-secondary btn-sm" id="btn-add">Add</button></div>
    <div class="meta-row">
      <div class="field" style="margin:0"><label>Description</label><input id="f-desc2" value="${esc(S.desc)}" placeholder="Box description"></div>
      <div class="field" style="margin:0"><label>Destination</label><input id="f-dest2" value="${esc(S.dest)}"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="btn-back2" style="flex:1">Back</button>
      <button class="btn btn-primary" id="btn-confirm" style="flex:2">Confirm box</button>
    </div>`+vreg();
    bind();updateTopStats();return;
  }
  r();
}

/* ── Confirm & save ── */
function confirmBox(){
  counters[S.tier]++;
  S.boxId=S.tier+"-"+String(counters[S.tier]).padStart(2,"0");
  const active=S.items.filter((_,i)=>!S.removed.includes(i));
  S.registry.push({id:S.boxId,tier:S.tier,desc:S.desc,dest:S.dest,count:active.length});
  S.step=3;r();
  writeToSheet();
}
function addItem(){const inp=q("#new-item");if(inp&&inp.value.trim()){S.items.push(inp.value.trim());r();}}

/* ── QR code ── */
function drawQR(){
  const cv=document.getElementById("qr-cv");if(!cv)return;
  const ctx=cv.getContext("2d");
  const url=SHEET_URL+"&box="+encodeURIComponent(S.boxId);
  const img=new Image();img.crossOrigin="anonymous";
  img.onload=()=>ctx.drawImage(img,0,0,60,60);
  img.onerror=()=>{ctx.fillStyle="#f5f5f5";ctx.fillRect(0,0,60,60);ctx.fillStyle="#aaa";ctx.font="8px monospace";ctx.textAlign="center";ctx.fillText("QR in",30,25);ctx.fillText("download",30,37);};
  img.src="https://api.qrserver.com/v1/create-qr-code/?size=60x60&data="+encodeURIComponent(url);
}

/* ── Toast ── */
function toast(msg){
  let t=document.getElementById("toast");
  if(!t){t=document.createElement("div");t.id="toast";t.style.cssText="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#222;color:#fff;font-size:13px;padding:10px 20px;border-radius:20px;z-index:999;transition:opacity .3s;pointer-events:none";document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity="1";clearTimeout(t._to);t._to=setTimeout(()=>t.style.opacity="0",2500);
}

r();
