<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#534AB7;--pl:#EEEDFE;--pd:#3C3489;
  --g:#1D9E75;--gl:#E1F5EE;--gd:#0F6E56;
  --a:#BA7517;--al:#FAEEDA;--ad:#854F0B;
  --r:#E24B4A;--rl:#FCEBEB;--rd:#A32D2D;
  --border:#e0ddf7;--surface:#ffffff;--bg:#f5f4fc;
  --text:#1a1a2e;--muted:#6b6b8a;--faint:#a0a0b8;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;color:var(--text);background:var(--bg);min-height:100vh;font-size:15px}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
.app{max-width:520px;margin:0 auto;padding:1rem 1rem 3rem}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:.75rem 0 1rem;border-bottom:0.5px solid var(--border);margin-bottom:1.25rem}
.top-title{font-size:16px;font-weight:600;color:var(--pd)}
.top-sub{font-size:11px;color:var(--muted)}
.steps-nav{display:flex;gap:4px;margin-bottom:1.5rem}
.step-dot{flex:1;height:3px;border-radius:2px;background:var(--border);transition:background .3s}
.step-dot.done{background:var(--p)}.step-dot.active{background:var(--p);opacity:.55}
.step-header{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--p);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.step-title{font-size:17px;font-weight:600}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:1rem 1.125rem;margin-bottom:1rem}
.tier-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.tier-btn{padding:10px 4px;border:1.5px solid var(--border);border-radius:8px;background:none;font-size:12px;font-weight:600;color:var(--muted);text-align:center;transition:all .15s;line-height:1.5}
.tier-btn.sel-A{border-color:var(--g);background:var(--gl);color:var(--gd)}
.tier-btn.sel-B{border-color:var(--a);background:var(--al);color:var(--ad)}
.tier-btn.sel-C{border-color:var(--p);background:var(--pl);color:var(--pd)}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.field input,.field textarea{width:100%;padding:10px 12px;border:0.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:14px;transition:border-color .15s}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--p)}
.upload-zone{border:1.5px dashed var(--border);border-radius:10px;padding:2rem 1rem;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:1rem;background:var(--surface)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--p);background:var(--pl)}
.upload-text{font-size:14px;color:var(--muted);margin-top:.5rem}
.upload-sub{font-size:12px;color:var(--faint);margin-top:4px}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.photo-thumb{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;border:0.5px solid var(--border)}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-del{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.65);color:#fff;border:none;font-size:15px;display:flex;align-items:center;justify-content:center;padding:0}
.add-photo-cell{aspect-ratio:1;border:1.5px dashed var(--border);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:var(--surface);transition:all .15s}
.add-photo-cell:hover{border-color:var(--p);background:var(--pl)}
.btn{width:100%;padding:13px;border-radius:9px;font-size:15px;font-weight:600;border:none;transition:all .15s;cursor:pointer}
.btn-primary{background:var(--p);color:#fff}.btn-primary:hover{background:var(--pd)}
.btn-primary:disabled{background:#ccc;cursor:not-allowed}
.btn-secondary{background:var(--surface);color:var(--text);border:0.5px solid var(--border)}
.btn-secondary:hover{border-color:var(--p);color:var(--p)}
.btn-success{background:var(--g);color:#fff}.btn-success:hover{background:var(--gd)}
.btn-sm{padding:7px 14px;font-size:13px;border-radius:7px;width:auto}
.btn-row{display:flex;gap:8px;margin-top:.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite}
.item-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem}
.item-row{display:flex;align-items:center;gap:8px;padding:10px 11px;border:0.5px solid var(--border);border-radius:8px;background:var(--surface)}
.item-row.removed{opacity:.4;background:var(--bg)}
.item-text{flex:1;font-size:14px;color:var(--text);outline:none;min-width:0;word-break:break-word}
.item-del{width:28px;height:28px;border-radius:6px;border:0.5px solid var(--border);background:none;color:var(--muted);font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;transition:all .15s}
.item-del:hover{background:var(--rl);border-color:var(--r);color:var(--rd)}
.item-restore{font-size:12px;padding:5px 10px;border:0.5px solid var(--g);border-radius:5px;background:none;color:var(--gd);white-space:nowrap}
.add-item-row{display:flex;gap:8px;margin-bottom:1rem}
.add-item-row input{flex:1;padding:10px 12px;border:0.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:14px}
.add-item-row input:focus{outline:none;border-color:var(--p)}
.clarify-card{background:var(--pl);border:0.5px solid #CECBF6;border-radius:10px;padding:.875rem 1rem;margin-bottom:1rem}
.clarify-q{font-size:14px;font-weight:600;color:var(--pd);margin-bottom:10px}
.clarify-opts{display:flex;flex-direction:column;gap:6px}
.clarify-opt{padding:10px 12px;border:1.5px solid #CECBF6;border-radius:8px;background:var(--surface);color:var(--text);font-size:14px;text-align:left;transition:all .15s;cursor:pointer}
.clarify-opt:hover,.clarify-opt.sel{border-color:var(--p);background:var(--pl);color:var(--pd);font-weight:600}
.meta-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.status-bar{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:1rem;line-height:1.5}
.status-ok{background:var(--gl);color:var(--gd);border:0.5px solid #9FE1CB}
.status-err{background:var(--rl);color:var(--rd);border:0.5px solid #F7C1C1}
.status-info{background:var(--pl);color:var(--pd);border:0.5px solid #CECBF6}
.status-warn{background:var(--al);color:var(--ad);border:0.5px solid #FAC775}
.label-preview{border:1px solid #ccc;border-radius:6px;overflow:hidden;background:#fff;color:#111;margin-bottom:1rem}
.lp-stripe{height:10px}.lp-body{display:flex;padding:10px 12px;gap:10px}
.lp-main{flex:1;display:flex;flex-direction:column;justify-content:space-between;min-width:0}
.lp-id{font-family:monospace;font-size:28px;font-weight:700;line-height:1;color:#111}
.lp-badge{display:inline-block;margin-top:4px;font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:3px}
.lp-desc{font-size:10px;font-weight:600;color:#222;line-height:1.3;margin-top:5px}
.lp-items{font-family:monospace;font-size:7px;color:#666;line-height:1.6;margin-top:4px}
.lp-bottom{margin-top:8px;padding-top:5px;border-top:.5px solid #e8e8e8;display:flex;justify-content:space-between;align-items:flex-end}
.lp-dest{font-size:8px;font-weight:700;color:#333;text-transform:uppercase;letter-spacing:.04em}
.lp-tag{font-family:monospace;font-size:7px;color:#aaa}
.lp-divider{width:1px;background:#eee;flex-shrink:0;align-self:stretch;margin:0 2px}
.lp-qr-side{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;flex-shrink:0;width:76px}
.lp-qr-side canvas{border:1px solid #e5e5e5;border-radius:3px;display:block}
.lp-qr-hint{font-size:7px;color:#999;text-align:center;line-height:1.3}
.registry{margin-top:2rem;padding-top:1.25rem;border-top:0.5px solid var(--border)}
.reg-header{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.reg-counts{display:flex;gap:10px}
.reg-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:0.5px solid var(--border);border-radius:8px;margin-bottom:5px;background:var(--surface)}
.reg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.reg-id{font-family:monospace;font-size:12px;font-weight:600;min-width:42px;color:var(--pd)}
.reg-desc{font-size:12px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.reg-n{font-size:11px;color:var(--faint)}
.info-box{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:.75rem 1rem;font-size:13px;color:var(--muted);margin-bottom:1rem;line-height:1.6}
.err-detail{background:#fff0f0;border:0.5px solid #F7C1C1;border-radius:8px;padding:10px 12px;font-size:11px;font-family:monospace;color:#A32D2D;margin-top:8px;word-break:break-all;line-height:1.6}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface);font-size:15px;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s}
.google-btn:hover{border-color:var(--p);background:var(--pl)}
.google-btn svg{flex-shrink:0}
.auth-badge{display:flex;align-items:center;gap:6px;font-size:12px;padding:5px 10px;border-radius:6px;background:var(--gl);color:var(--gd);border:0.5px solid #9FE1CB}
.settings-row{display:flex;align-items:center;gap:8px;padding:.5rem 0;border-bottom:0.5px solid var(--border);margin-bottom:.5rem}
.settings-label{font-size:13px;color:var(--muted);flex:1}
.key-input{font-family:monospace;font-size:12px;letter-spacing:.05em}
.menu-grid{display:flex;flex-direction:column;gap:10px;margin-top:.5rem}
.menu-card{display:flex;align-items:center;gap:14px;padding:16px;border:0.5px solid var(--border);border-radius:12px;background:var(--surface);cursor:pointer;transition:all .15s}
.menu-card:hover,.menu-card:active{border-color:var(--p);background:var(--pl)}
.menu-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.menu-label{font-size:15px;font-weight:600;color:var(--text)}
.menu-sub{font-size:12px;color:var(--muted);margin-top:2px}
.back-link{display:inline-flex;align-items:center;gap:4px;font-size:13px;color:var(--p);font-weight:600;cursor:pointer;margin-bottom:1rem;padding:4px 0}
.back-link:hover{text-decoration:underline}
</style>
</head>

// roundRect polyfill for older Android Chrome
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(w<2*r)r=w/2;if(h<2*r)r=h/2;
    this.beginPath();this.moveTo(x+r,y);
    this.arcTo(x+w,y,x+w,y+h,r);this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+w,y,r);this.closePath();
    return this;
  };
}

function getApiKey(){return localStorage.getItem("anthropic_key")||"";}
function saveApiKey(k){localStorage.setItem("anthropic_key",k);}

const root = document.getElementById("root");
function q(s){return document.querySelector(s);}
function qq(s){return Array.from(document.querySelectorAll(s));}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function chunkItems(items,max){
  const lines=[];let line="";
  items.forEach(item=>{
    const seg=line?" · "+item:item;
    if((line+seg).length>max&&line){lines.push(line);line=item;}
    else line+=seg;
  });
  if(line)lines.push(line);
  return lines;
}
function updateTopStats(){
  const ca={A:0,B:0,C:0};S.registry.forEach(b=>ca[b.tier]++);
  const el=document.getElementById("top-stats");
  if(el)el.innerHTML=`${S.registry.length} boxes&nbsp; <span style="color:#0F6E56">A:${ca.A}</span> <span style="color:#854F0B">B:${ca.B}</span> <span style="color:#3C3489">C:${ca.C}</span>`;
  const ai=document.getElementById("auth-indicator");
  if(ai){
    if(googleUser){
      ai.innerHTML=`<div class="auth-badge" onclick="startGoogleAuth()" title="Click to reconnect" style="cursor:pointer"><svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="6" fill="#1D9E75"/><path d="M3 6l2 2 4-4" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>${esc(googleUser.split("@")[0])} ↺</div>`;
    } else {
      ai.innerHTML="";
    }
  }
}

function nav(){
  return '<div class="steps-nav">'+[0,1,2,3,4].map(i=>
    `<div class="step-dot ${i<S.step?"done":i===S.step?"active":""}"></div>`
  ).join("")+"</div>";
}
function r(){root.innerHTML=view();bind();updateTopStats();}
function view(){
  if(S.screen === "menu") return vMenu();
  if(S.screen === "registry") return vRegistryBrowser();
  if(S.screen === "documents") return vDocuments();
  // default: pack flow
  const stepFn = [v0,v1,S.mode==="item"?v2item:v2,v3,v4];
  return nav()+stepFn[S.step]()+vreg();
}

/* ── Google OAuth ── */
function startGoogleAuth(){
  if(!window.google){toast("Google Sign-In library not loaded yet — try again in a moment");return;}
  const client=google.accounts.oauth2.initTokenClient({
    client_id:GOOGLE_CLIENT_ID,
    scope:SCOPES,
    prompt:"consent",
    callback:(resp)=>{
      if(resp.error){toast("Google auth failed: "+resp.error);return;}
      googleToken=resp.access_token;
      fetchGoogleUserInfo();
    }
  });
  client.requestAccessToken({prompt:"consent"});
}

async function fetchGoogleUserInfo(){
  try{
    const resp=await fetch("https://www.googleapis.com/oauth2/v3/userinfo",{headers:{Authorization:"Bearer "+googleToken}});
    const data=await resp.json();
    googleUser=data.email||data.name||"connected";

}

/* ── Write to Google Sheets ── */
async function writeToSheet(){
  if(!googleToken){S.sheetResult="skip";S.step=4;r();setTimeout(drawQR,50);return;}
  const active=S.items.filter((_,i)=>!S.removed.includes(i));
  const today=new Date().toLocaleDateString("en-GB");
  try{
    // Upload photos to Drive first so we have the folder URL for the sheet
    let driveFolderUrl = "";
    let driveFolderId = "";
    if(S.photos.length > 0){
      try{
        const folderId = await getOrCreateFolder(S.boxId);
        driveFolderId = folderId;
        driveFolderUrl = "https://drive.google.com/drive/folders/" + folderId;
        S.driveFolderUrl = driveFolderUrl;
        await uploadPhotosToDrive(folderId);
      }catch(de){console.warn("Drive upload failed:",de.message);S.driveError=de.message;}
    }
    // Ensure headers exist on first write
    await ensureHeaders();
    // Get current row counts so we know where new data lands
    const regInfo = await getSheetInfo(REGISTRY_SHEET);
    const itemInfo = await getSheetInfo(ITEMS_SHEET);
    const regStartRow = regInfo.rowCount + 1;
    const itemStartRow = itemInfo.rowCount + 1;
    // Append data — include Drive folder URL in registry row
    const t = TIER[S.tier];
    const photosCell = driveFolderUrl ? `=HYPERLINK("${driveFolderUrl}","📷 View photos")` : "";
    const regRow=[[S.boxId, S.tier, t.lbl.split(" · ")[1]||S.tier, S.desc, S.dest, active.length, S.fragile?"Yes":"No", today, SHEET_URL+"&box="+encodeURIComponent(S.boxId), photosCell]];
    await sheetsAppend(REGISTRY_SHEET, regRow);
    const itemRows=active.map((item,i)=>[S.boxId, i+1, S.itemCategories?.[i]||getCategory(item), item, 1, ""]);
    if(itemRows.length) await sheetsAppend(ITEMS_SHEET, itemRows);
    // Format the new rows (non-fatal if fails)
    try{
      const regSheetId = await getSheetId(REGISTRY_SHEET);
      const itemSheetId = await getSheetId(ITEMS_SHEET);
      await formatNewRows(regSheetId, regStartRow-1, S.tier, false);
      if(itemRows.length) await formatNewRows(itemSheetId, itemStartRow-1, S.tier, true);
    }catch(fe){console.warn("Formatting failed (data still saved):",fe.message);}
    S.sheetResult="ok";
  }catch(e){
    S.sheetResult=e.message||"unknown error";
  }
  S.step=4;r();setTimeout(drawQR,50);
}

async function getSheetInfo(sheetName){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/'${sheetName}'!A:A`;
  const resp=await fetch(url,{headers:{"Authorization":"Bearer "+googleToken}});
  if(!resp.ok) return {rowCount:1};
  const data=await resp.json();
  return {rowCount:(data.values||[]).length};
}

async function getSheetId(sheetName){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}?fields=sheets.properties`;
  const resp=await fetch(url,{headers:{"Authorization":"Bearer "+googleToken}});
  const data=await resp.json();
  const found=(data.sheets||[]).find(s=>s.properties.title===sheetName);
  return found?found.properties.sheetId:0;
}

/* ── Google Drive helpers ── */
async function getOrCreateFolder(boxId){
  // Find or create root "Aachen Move" folder
  const rootId = await findOrMakeFolder(ROOT_FOLDER_NAME, "root");
  // Find or create box subfolder inside it
  const boxFolderId = await findOrMakeFolder(boxId, rootId);
  return boxFolderId;
}

async function findOrMakeFolder(name, parentId){
  // Search for existing folder
  const q = encodeURIComponent(`name='${name}' and mimeType='application/vnd.google-apps.folder' and '${parentId}' in parents and trashed=false`);
  const resp = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`,{
    headers:{"Authorization":"Bearer "+googleToken}
  });
  if(!resp.ok){const e=await resp.text();throw new Error("Drive search "+resp.status+": "+e.slice(0,150));}
  const data = await resp.json();
  if(data.files && data.files.length > 0) return data.files[0].id;
  // Create it
  const createResp = await fetch("https://www.googleapis.com/drive/v3/files",{
    method:"POST",
    headers:{"Authorization":"Bearer "+googleToken,"Content-Type":"application/json"},
    body:JSON.stringify({
      name, mimeType:"application/vnd.google-apps.folder",
      parents:[parentId]
    })
  });
  if(!createResp.ok){const e=await createResp.text();throw new Error("Drive mkdir "+createResp.status+": "+e.slice(0,150));}
  const created = await createResp.json();
  return created.id;
}

async function uploadPhotosToDrive(folderId){
  for(let i=0;i<S.photos.length;i++){
    const dataUrl = S.photos[i];
    const [meta, b64] = dataUrl.split(",");
    const mimeType = meta.match(/:(.*?);/)[1];
    const ext = mimeType.includes("png") ? "png" : "jpg";
    const filename = `${S.boxId}_photo${i+1}.${ext}`;
    // Convert base64 to blob
    const byteStr = atob(b64);
    const arr = new Uint8Array(byteStr.length);
    for(let j=0;j<byteStr.length;j++) arr[j]=byteStr.charCodeAt(j);
    const blob = new Blob([arr],{type:mimeType});
    // Multipart upload
    const boundary = "bound" + Date.now();
    const metaPart = JSON.stringify({name:filename,parents:[folderId]});
    const formData = new FormData();
    formData.append("metadata", new Blob([metaPart],{type:"application/json"}));
    formData.append("file", blob, filename);
    const uploadResp = await fetch(
      "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name",{
        method:"POST",
        headers:{"Authorization":"Bearer "+googleToken},
        body:formData
      }
    );
    if(!uploadResp.ok){const e=await uploadResp.text();console.warn("Photo upload failed:",e.slice(0,100));}
  }
}

async function batchUpdate(requests){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}:batchUpdate`;
  const resp=await fetch(url,{
    method:"POST",
    headers:{"Authorization":"Bearer "+googleToken,"Content-Type":"application/json"},
    body:JSON.stringify({requests})
  });
  if(!resp.ok){const e=await resp.text();throw new Error("Format error "+resp.status+": "+e.slice(0,200));}
  return resp.json();
}

async function sheetsAppend(sheetName,values){
  // First verify we can read the spreadsheet at all
  const checkUrl=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}?fields=sheets.properties`;
  const check=await fetch(checkUrl,{headers:{"Authorization":"Bearer "+googleToken}});
  if(!check.ok){
    const e=await check.text();
    throw new Error("Cannot access spreadsheet ("+check.status+"): "+e.slice(0,200));
  }
  const meta=await check.json();
  // Find the sheet tab by name
  const sheets=meta.sheets||[];
  const found=sheets.find(s=>s.properties.title===sheetName);
  if(!found){
    const names=sheets.map(s=>s.properties.title).join(", ");
    throw new Error(`Tab "${sheetName}" not found. Tabs in this sheet: ${names}`);
  }
  // Append using the confirmed tab name
  const range=`'${sheetName}'!A1`;
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`;
  const resp=await fetch(url,{
    method:"POST",
    headers:{"Authorization":"Bearer "+googleToken,"Content-Type":"application/json"},
    body:JSON.stringify({values})
  });
  if(!resp.ok){const e=await resp.text();throw new Error(resp.status+": "+e.slice(0,300));}
  return resp.json();
}

function getCategory(item){
  const i=item.toLowerCase();
  if(i.includes("book")||i.includes("novel")||i.includes("guide")||["harry","speed secrets","perfect corner","rya","fodor"].some(k=>i.includes(k)))return"Books";
  if(i.includes("kart")||i.includes("helmet")||i.includes("glove")||i.includes("rib")||i.includes("engine")||i.includes("tool"))return"Karting";
  if(i.includes("cloth")||i.includes("shirt")||i.includes("jacket")||i.includes("shoe")||i.includes("boot")||i.includes("dress"))return"Clothing";
  if(i.includes("yeti")||i.includes("mug")||i.includes("cup")||i.includes("plate")||i.includes("bowl")||i.includes("kitchen"))return"Kitchen";
  if(i.includes("plush")||i.includes("toy")||i.includes("game")||i.includes("lego"))return"Kids / Toys";
  return"Household";
}

/* ── File handling ── */
function handleFiles(files){
  const slots=4-S.photos.length;
  Array.from(files).slice(0,slots).forEach(file=>{
    compressImage(file,1200,0.82).then(dataUrl=>{S.photos.push(dataUrl);r();});
  });
}

function compressImage(file,maxPx,quality){
  return new Promise(resolve=>{
    const rd=new FileReader();
    rd.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>maxPx||h>maxPx){
          if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}
          else{w=Math.round(w*maxPx/h);h=maxPx;}
        }
        const cv=document.createElement("canvas");
        cv.width=w;cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        resolve(cv.toDataURL("image/jpeg",quality));
      };
      img.src=e.target.result;
    };
    rd.readAsDataURL(file);
  });
}

async function analyze(){
  S.step=2;S.items=[];S.removed=[];S.clarifications=[];S.clarifyIdx=0;
  root.innerHTML=nav()+`
  <div class="step-header"><div class="step-num">3</div><div class="step-title">Analyzing photos…</div></div>
  <div style="text-align:center;padding:3rem 1rem;color:var(--muted)">

    Analyzing ${S.photos.length} photo${S.photos.length>1?"s":""}…<br>
    <span style="font-size:12px;margin-top:6px;display:block">Usually takes 10–20 seconds</span>
  </div>`;
  try{
    const imgContent=S.photos.map(url=>{
      const [meta,data]=url.split(",");
      const mt=meta.match(/:(.*?);/)[1];
      return{type:"image",source:{type:"base64",media_type:mt,data}};
    });
    const apiKey=getApiKey();
    if(!apiKey){throw new Error("No API key saved — go back to step 1 and enter your key");}
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true",
      },
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1200,
        system: S.mode==="item"
          ? `You are a moving inventory assistant. Analyze photos of a single item (furniture, appliance, or bulky object).
Return ONLY a valid JSON object with these exact keys:
- "desc": precise item description including brand, model, color, material if visible (e.g. "IKEA KALLAX 4x4 shelf unit, white")
- "category": one of: Furniture, Appliance, Electronics, Clothing, Karting, Books, Kids / Toys, Art / Decor, Tools, Other
- "value": estimated USD replacement value as a number (e.g. 150)
- "valueSource": string explaining how value was estimated, e.g. "Current IKEA retail price", "Average used furniture market value", "Estimated based on brand and condition".
- "dimensions": estimated dimensions as string if determinable, else ""
- "fragile": boolean
- "clarifications": array of up to 2 objects with "question" and "options" array for anything uncertain
No markdown, no explanation, only the JSON object.`
          : `You are a moving box inventory assistant. Analyze photos of box contents carefully.
Return ONLY a valid JSON object with these exact keys:
- "items": array of specific item name strings. Be precise: include brand names if visible, full book titles and authors if readable.
- "values": array of estimated USD replacement values (numbers), one per item in same order as items array.
- "valueSources": array of strings explaining how each value was estimated — e.g. "Current Amazon price for comparable item", "Brand new retail price", "Estimated used/depreciated value", "Default category estimate". One per item matching values array.
- "desc": short 4-8 word description of the box contents
- "clarifications": array of up to 2 objects with "question" (string) and "options" (array of 3-4 short strings), for anything genuinely uncertain
- "fragile": boolean
No markdown, no explanation, only the JSON object.`,
        messages:[{role:"user",content:[
          ...imgContent,
          {type:"text",text:S.mode==="item"
            ? `Identify this single item. ${S.desc?"Context: "+S.desc:""}. Estimate its current USD replacement value carefully.`
            : `Analyze these ${S.photos.length} photo(s). Destination: ${S.dest}${S.desc?" | Context: "+S.desc:""}. List every visible item and estimate USD replacement value for each.`}
        ]}]
      })
    });
    if(!resp.ok){const e=await resp.text();throw new Error(`API ${resp.status}: ${e.slice(0,200)}`);}
    const data=await resp.json();
    const raw=data.content[0].text.trim().replace(/^```json|^```|```$/gm,"").trim();
    const parsed=JSON.parse(raw);
    if(S.mode==="item"){
      if(parsed.desc&&!S.desc)S.desc=parsed.desc;
      if(parsed.category)S.singleCategory=parsed.category;
      if(parsed.value){S.singleValue=parsed.value;S.singleValueSource=parsed.valueSource||"AI estimate — based on visible brand/condition";}
      if(parsed.dimensions)S.singleDimensions=parsed.dimensions;
      if(parsed.fragile)S.fragile=true;
      S.clarifications=parsed.clarifications||[];
    } else {
      S.items=parsed.items||[];
      S.clarifications=parsed.clarifications||[];
      if(parsed.values){parsed.values.forEach((v,i)=>{
        if(v){S.itemValues[i]=v;S.itemValueSources[i]="AI estimate — based on visible brand/condition";}
      });}
      if(parsed.valueSources){parsed.valueSources.forEach((src,i)=>{if(src)S.itemValueSources[i]=src;});}
      if(parsed.desc&&!S.desc)S.desc=parsed.desc;
      if(parsed.fragile)S.fragile=true;
    }
  }catch(err){
    const errMsg = err.message||String(err);
    let hint="";
    if(errMsg.includes("Failed to fetch")||errMsg.includes("NetworkError")||errMsg.includes("Load failed")){
      hint="Network error — check your internet connection. If on GitHub Pages, make sure the URL starts with https://.";
    } else if(errMsg.includes("401")||errMsg.includes("authentication")){
      hint="API key rejected — go back to step 1 and re-enter your key.";
    } else if(errMsg.includes("No API key")){
      hint="";
    }
    S.items=[];
    root.innerHTML=nav()+`
    <div class="step-header"><div class="step-num">3</div><div class="step-title">Analysis failed</div></div>
    <div class="status-bar status-err">Could not analyze photos — add items manually below.</div>

    <div class="item-list"></div>

    <div class="meta-row">

      <div class="field" style="margin:0"><label>Destination</label><input id="f-dest2" value="${esc(S.dest)}"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="btn-back2" style="flex:1">Back</button>
      <button class="btn btn-primary" id="btn-confirm" style="flex:2">Confirm box</button>
    </div>`+vreg();
    bind();updateTopStats();return;
  }
  r();
}

/* ── Supabase: get next available code ── */
const MOVE_ID = "f3ec17dd-437a-4e60-bbe5-58d1ce340ed9"; // Chicago → Aachen 2026

async function getNextBoxCode(tier){
  // Ask the database: what box codes exist for this tier in this move?
  const {data, error} = await sb
    .from("boxes")
    .select("box_code")
    .eq("move_id", MOVE_ID)
    .like("box_code", tier + "-%");

  if(error){ console.error("Supabase error:", error); return tier + "-01"; }

  // Find the highest number (e.g. if A-01, A-02, A-05 exist → highest is 5)
  let max = 0;
  (data||[]).forEach(row => {
    const num = parseInt(row.box_code.split("-")[1], 10);
    if(num > max) max = num;
  });
  return tier + "-" + String(max + 1).padStart(2, "0");
}

async function getNextItemCode(){
  const {data, error} = await sb
    .from("standalone_items")
    .select("item_code")
    .eq("move_id", MOVE_ID);

  if(error){ console.error("Supabase error:", error); return "I-01"; }

  let max = 0;
  (data||[]).forEach(row => {
    const num = parseInt(row.item_code.split("-")[1], 10);
    if(num > max) max = num;
  });
  return "I-" + String(max + 1).padStart(2, "0");
}

/* ── Supabase: save box + items to database ── */
async function saveBoxToSupabase(){
  const active = S.items.filter((_,i) => !S.removed.includes(i));
  const totalCents = active.reduce((sum, _, i) => {
    const origIdx = S.items.indexOf(active[i] === active[i] ? S.items.filter((_,j)=>!S.removed.includes(j))[i] : active[i]);
    return sum + Math.round((S.itemValues?.[origIdx] || 0) * 100);
  }, 0);

  if(S.mode === "item"){
    // Save standalone item
    const {error} = await sb.from("standalone_items").insert({
      move_id: MOVE_ID,
      item_code: S.boxId,
      tier: S.tier,
      category: S.singleCategory || "Household",
      description: S.desc || S.items[0] || "Standalone item",
      destination_room: S.dest,
      dimensions: S.singleDimensions || null,
      is_fragile: S.fragile,
      packed_by: S.packedBy,
      est_value_cents: Math.round((S.singleValue || 0) * 100),
      value_source: S.singleValueSource || null,
      value_source_type: S.singleValueSource ? "ai_estimate" : "not_set",
    });
    if(error) console.error("Supabase standalone_items error:", error);
  } else {
    // Save box
    const {data: boxData, error: boxErr} = await sb.from("boxes").insert({
      move_id: MOVE_ID,
      box_code: S.boxId,
      tier: S.tier,
      description: S.desc,
      destination_room: S.dest,
      is_fragile: S.fragile,
      packed_by: S.packedBy,
      est_value_cents: totalCents,
      item_count: active.length,
    }).select("id").single();

    if(boxErr){ console.error("Supabase box error:", boxErr); return; }

    // Save each item inside the box
    const itemRows = active.map((item, i) => ({
      box_id: boxData.id,
      move_id: MOVE_ID,
      item_number: i + 1,
      category: S.itemCategories?.[S.items.indexOf(item)] || "Other",
      description: item,
      quantity: 1,
      est_value_cents: Math.round((S.itemValues?.[S.items.indexOf(item)] || 0) * 100),
      value_source: S.itemValueSources?.[S.items.indexOf(item)] || null,
      value_source_type: S.itemValueSources?.[S.items.indexOf(item)] ? "ai_estimate" : "not_set",
    }));

    if(itemRows.length > 0){
      const {error: itemErr} = await sb.from("box_items").insert(itemRows);
      if(itemErr) console.error("Supabase box_items error:", itemErr);
    }
  }
}

/* ── Supabase: load existing boxes + items into registry on startup ── */
async function loadRegistryFromSupabase(){
  try {
    // Load all boxes for this move
    const {data: boxes, error: boxErr} = await sb
      .from("boxes")
      .select("box_code, tier, description, destination_room, item_count")
      .eq("move_id", MOVE_ID)
      .order("created_at", {ascending: true});

    if(boxErr){ console.error("Failed to load boxes:", boxErr); return; }

    // Load all standalone items for this move
    const {data: items, error: itemErr} = await sb
      .from("standalone_items")
      .select("item_code, tier, description, destination_room")
      .eq("move_id", MOVE_ID)
      .order("created_at", {ascending: true});

    if(itemErr){ console.error("Failed to load items:", itemErr); return; }

    // Build the registry array from database results
    S.registry = [];
    (boxes || []).forEach(b => {
      S.registry.push({
        id: b.box_code,
        tier: b.tier,
        desc: b.description || "",
        dest: b.destination_room || "",
        count: b.item_count || 0,
        mode: "box"
      });
    });
    (items || []).forEach(item => {
      S.registry.push({
        id: item.item_code,
        tier: item.tier,
        desc: item.description || "",
        dest: item.destination_room || "",
        count: 1,
        mode: "item"
      });
    });

    // Re-render so the registry panel shows the loaded data
    r();
    console.log(`Registry loaded: ${boxes?.length || 0} boxes, ${items?.length || 0} standalone items`);
  } catch(e){
    console.error("Registry load error:", e);
  }
}

/* ── Confirm & save ── */
async function confirmBox(){
  // Get next code from database instead of in-memory counter
  if(S.mode==="item"){
    S.boxId = await getNextItemCode();
  } else {
    S.boxId = await getNextBoxCode(S.tier);
  }
  const active=S.items.filter((_,i)=>!S.removed.includes(i));
  S.registry.push({id:S.boxId,tier:S.tier,desc:S.desc,dest:S.dest,
    count:S.mode==="item"?1:active.length,mode:S.mode});
  S.step=3;r();
  // Save to both Supabase and Google Sheets
  saveBoxToSupabase();
  writeToSheet();
}

/* ── QR code ── */
function drawQR(){
  const cv=document.getElementById("qr-cv");if(!cv)return;
  const ctx=cv.getContext("2d");
  const url=SHEET_URL+"&box="+encodeURIComponent(S.boxId);
  const img=new Image();img.crossOrigin="anonymous";
  img.onload=()=>ctx.drawImage(img,0,0,60,60);
  img.onerror=()=>{ctx.fillStyle="#f5f5f5";ctx.fillRect(0,0,60,60);ctx.fillStyle="#aaa";ctx.font="8px monospace";ctx.textAlign="center";ctx.fillText("QR in",30,25);ctx.fillText("download",30,37);};
  img.src="https://api.qrserver.com/v1/create-qr-code/?size=60x60&data="+encodeURIComponent(url);
}

    const dataUrl = await renderLabelToCanvas(copies);
    const blob = await (await fetch(dataUrl)).blob();
    const file = new File([blob], `label_${S.boxId}_${copies}x.png`, {type:"image/png"});

    if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({
        title: `Label ${S.boxId} — ${copies} cop${copies===1?"y":"ies"}`,
        text: `Box ${S.boxId} · ${S.desc} · ${S.dest}`,
        files:[file]
      });
    } else if(navigator.share){
      // Fallback: share without file (older Android)
      const url = URL.createObjectURL(blob);
      await navigator.share({title:`Label ${S.boxId}`, url});
      setTimeout(()=>URL.revokeObjectURL(url), 5000);
    } else {
      // Desktop fallback: download PNG
      const a = document.createElement("a");
      a.href = dataUrl;
      a.download = `label_${S.boxId}_${copies}x.png`;
      a.click();
      toast("Web Share not supported — PNG downloaded instead");
    }
  }catch(e){
    if(e.name!=="AbortError") toast("Share failed: "+e.message);
  }
}

async function renderLabelToCanvas(copies){
  const t = TIER[S.tier];
  const active = S.items.filter((_,i)=>!S.removed.includes(i));
  const lines = chunkItems(active, 72);

  // Label dimensions: 696 x 418px (at 174dpi = 4x2.4 inch)
  const LW = 696, LH = 418;
  const GAP = 16;
  const cols = copies === 4 ? 2 : 1;
  const rows = copies === 4 ? 2 : copies;
  const CW = LW * cols + GAP * (cols - 1);
  const CH = LH * rows + GAP * (rows - 1);

  const cv = document.createElement("canvas");
  cv.width = CW + 48;
  cv.height = CH + 48;
  const ctx = cv.getContext("2d");

  // White background
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, cv.width, cv.height);

  for(let ci = 0; ci < copies; ci++){
    const col = copies === 4 ? ci % 2 : 0;
    const row = copies === 4 ? Math.floor(ci / 2) : ci;
    const ox = 24 + col * (LW + GAP);
    const oy = 24 + row * (LH + GAP);
    drawLabelOnCanvas(ctx, ox, oy, LW, LH, t, active, lines);
  }

  // Add QR code to each label
  const qrUrl = SHEET_URL + "&box=" + encodeURIComponent(S.boxId);
  const qrImg = await loadImage("https://api.qrserver.com/v1/create-qr-code/?size=110x110&data=" + encodeURIComponent(qrUrl));

  for(let ci = 0; ci < copies; ci++){
    const col = copies === 4 ? ci % 2 : 0;
    const row = copies === 4 ? Math.floor(ci / 2) : ci;
    const ox = 24 + col * (LW + GAP);
    const oy = 24 + row * (LH + GAP);
    if(qrImg) ctx.drawImage(qrImg, ox + LW - 130, oy + LH - 140, 110, 110);
  }

  return cv.toDataURL("image/png");
}

function drawLabelOnCanvas(ctx, ox, oy, W, H, t, active, lines){
  // Border
  ctx.strokeStyle = "#cccccc";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(ox, oy, W, H, 8);
  ctx.stroke();

  // Clip to label bounds
  ctx.save();
  ctx.beginPath();
  ctx.roundRect(ox, oy, W, H, 8);
  ctx.clip();

  // White fill
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(ox, oy, W, H);

  // Tier stripe
  ctx.fillStyle = t.stripe;
  ctx.fillRect(ox, oy, W, 16);

  // Box ID
  ctx.fillStyle = "#111111";
  ctx.font = "bold 72px 'Courier New', monospace";
  ctx.fillText(S.boxId, ox + 20, oy + 90);

  // Tier badge
  const badgeX = ox + 20, badgeY = oy + 102;
  const badgeW = 220, badgeH = 24;
  ctx.fillStyle = t.bb;
  ctx.beginPath();
  ctx.roundRect(badgeX, badgeY, badgeW, badgeH, 4);
  ctx.fill();
  ctx.fillStyle = t.bt;
  ctx.font = "bold 11px Arial, sans-serif";
  ctx.fillText(t.lbl.toUpperCase(), badgeX + 8, badgeY + 16);

  // Description
  ctx.fillStyle = "#222222";
  ctx.font = "bold 18px Arial, sans-serif";
  ctx.fillText(S.desc || "—", ox + 20, oy + 152);

  // Items
  ctx.fillStyle = "#666666";
  ctx.font = "12px 'Courier New', monospace";
  lines.slice(0, 6).forEach((line, i) => {
    ctx.fillText(line, ox + 20, oy + 178 + i * 18);
  });

  // Bottom bar
  ctx.strokeStyle = "#e8e8e8";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(ox + 16, oy + H - 44);
  ctx.lineTo(ox + W - 16, oy + H - 44);
  ctx.stroke();

  // Destination
  ctx.fillStyle = "#333333";
  ctx.font = "bold 13px Arial, sans-serif";
  ctx.fillText("→ " + S.dest.toUpperCase(), ox + 20, oy + H - 26);

  // Move tag
  ctx.fillStyle = "#aaaaaa";
  ctx.font = "11px 'Courier New', monospace";
  const countStr = active.length + " items · Aachen · Jun 2026" + (S.fragile ? " · ⚠ FRAGILE" : "");
  ctx.fillText(countStr, ox + 20, oy + H - 10);

  // QR placeholder box
  ctx.strokeStyle = "#e5e5e5";
  ctx.lineWidth = 1;
  ctx.strokeRect(ox + W - 130, oy + H - 140, 110, 110);
  ctx.fillStyle = "#f5f5f5";
  ctx.fillRect(ox + W - 130, oy + H - 140, 110, 110);

  // QR hint text
  ctx.fillStyle = "#999999";
  ctx.font = "10px Arial, sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("Scan for", ox + W - 75, oy + H - 72);
  ctx.fillText("inventory", ox + W - 75, oy + H - 58);
  ctx.textAlign = "left";

  // Divider line before QR
  ctx.strokeStyle = "#eeeeee";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(ox + W - 142, oy + H - 152);
  ctx.lineTo(ox + W - 142, oy + H - 16);
  ctx.stroke();

  ctx.restore();
}

function loadImage(src){
  return new Promise(resolve=>{
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

/* ── Photo lightbox ── */
function openLightbox(idx){
  const now = new Date();
  const dateStr = now.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
  const timeStr = now.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
  const label = document.createElement("div");
  label.id = "lightbox-overlay";
  label.style.cssText = "position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem";
  label.innerHTML = `
    <div style="position:relative;max-width:100%;max-height:80vh;border-radius:10px;overflow:hidden">
      <img src="${S.photos[idx]}" style="max-width:100%;max-height:80vh;display:block;border-radius:10px;object-fit:contain">
      <div style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.75));padding:12px 14px 10px;border-radius:0 0 10px 10px">
        <div style="color:#fff;font-size:12px;font-family:monospace;line-height:1.6">
          <span style="opacity:.7">${dateStr} ${timeStr}</span>
          ${S.boxId?`<span style="margin-left:10px;background:rgba(255,255,255,.2);padding:1px 6px;border-radius:4px">${S.boxId}</span>`:""}
          <span style="margin-left:10px;opacity:.8">Packed by ${S.packedBy}</span>
          <span style="margin-left:10px;opacity:.6">Photo ${idx+1}/${S.photos.length}</span>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:12px;margin-top:14px">
      ${idx>0?`<button onclick="closeLightbox();openLightbox(${idx-1})" style="padding:8px 18px;border-radius:8px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:14px;cursor:pointer;font-family:inherit">← Prev</button>`:""}
      <button onclick="closeLightbox()" style="padding:8px 18px;border-radius:8px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:14px;cursor:pointer;font-family:inherit">Close</button>
      ${idx<S.photos.length-1?`<button onclick="closeLightbox();openLightbox(${idx+1})" style="padding:8px 18px;border-radius:8px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:14px;cursor:pointer;font-family:inherit">Next →</button>`:""}
    </div>
  `;
  label.addEventListener("click", e=>{ if(e.target===label) closeLightbox(); });
  document.body.appendChild(label);
}
function closeLightbox(){
  const el=document.getElementById("lightbox-overlay");
  if(el)el.remove();
}

/* ── Next box ── */
function nextBox(){
  S={...S,step:0,mode:S.mode,tier:"C",dest:"",desc:"",fragile:false,
     packedBy:S.packedBy,
     photos:[],items:[],removed:[],
     itemCategories:{},itemValues:{},itemValueSources:{},
     singleValue:0,singleValueSource:"",singleCategory:"Household",singleDimensions:"",
     clarifications:[],clarifyIdx:0,boxId:"",sheetResult:"",editingItem:null,driveFolderUrl:"",driveError:""};
  r();
}

/* ── Toast ── */
function toast(msg){
  let t=document.getElementById("toast");
  if(!t){t=document.createElement("div");t.id="toast";t.style.cssText="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#222;color:#fff;font-size:13px;padding:10px 20px;border-radius:20px;z-index:999;transition:opacity .3s;pointer-events:none";document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity="1";clearTimeout(t._to);t._to=setTimeout(()=>t.style.opacity="0",2500);
}

r();
loadRegistryFromSupabase();
