<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Brand */
  --yellow:#F5D800;--yellow-dim:#FFF9CC;--yellow-dark:#C9AE00;
  /* Semantic (kept for status bars) */
  --p:#0D0E12;--pl:#F5F5F3;--pd:#0D0E12;
  --g:#1D9E75;--gl:#E1F5EE;--gd:#0F6E56;
  --a:#BA7517;--al:#FAEEDA;--ad:#854F0B;
  --r:#E24B4A;--rl:#FCEBEB;--rd:#A32D2D;
  /* Layout */
  --border:#E8E7E2;--surface:#FFFFFF;--bg:#F7F7F5;
  --text:#0D0E12;--muted:#888882;--faint:#C4C3BE;
  /* Tier colours */
  --tier-a-bg:#F5D800;--tier-a-text:#0D0E12;
  --tier-b-bg:#E8E7E2;--tier-b-text:#555553;
  --tier-c-bg:#F0F0EE;--tier-c-text:#888882;
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;color:var(--text);background:var(--bg);min-height:100vh;font-size:15px}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
.app{max-width:520px;margin:0 auto;padding:1rem 1rem 3rem}

/* ── Top bar ── */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:.75rem 0 1rem;border-bottom:1px solid var(--border);margin-bottom:1.25rem}
.top-title{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.01em}
.top-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* ── Progress dots ── */
.steps-nav{display:flex;gap:4px;margin-bottom:1.5rem}
.step-dot{flex:1;height:3px;border-radius:2px;background:var(--border);transition:background .3s}
.step-dot.done{background:var(--text)}.step-dot.active{background:var(--text);opacity:.4}

/* ── Step header ── */
.step-header{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem}
.step-num{width:28px;height:28px;border-radius:8px;background:var(--text);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.step-title{font-size:18px;font-weight:800;letter-spacing:-.01em}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1rem 1.125rem;margin-bottom:1rem}

/* ── Tier buttons (A–E, monochrome) ── */
.tier-row{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:1rem}
.tier-btn{padding:10px 2px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface);font-size:12px;font-weight:600;color:var(--muted);text-align:center;transition:all .15s;line-height:1.5}
.tier-btn.sel{border-color:var(--text);background:var(--text);color:#fff;font-weight:700}

/* ── Form fields ── */
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.field input,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);font-size:14px;transition:border-color .15s}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--text)}

/* ── Upload zone ── */
.upload-zone{border:1.5px dashed var(--border);border-radius:14px;padding:2rem 1rem;text-align:center;cursor:pointer;transition:all .15s;margin-bottom:1rem;background:var(--surface)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--text);background:var(--bg)}
.upload-text{font-size:14px;color:var(--muted);margin-top:.5rem}
.upload-sub{font-size:12px;color:var(--faint);margin-top:4px}

/* ── Photo grid ── */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.photo-thumb{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-del{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.65);color:#fff;border:none;font-size:15px;display:flex;align-items:center;justify-content:center;padding:0}
.add-photo-cell{aspect-ratio:1;border:1.5px dashed var(--border);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:var(--surface);transition:all .15s}
.add-photo-cell:hover{border-color:var(--text);background:var(--bg)}

/* ── Buttons ── */
.btn{width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:700;border:none;transition:all .15s;cursor:pointer;letter-spacing:-.01em}
.btn-primary{background:var(--text);color:#fff}.btn-primary:hover{background:#2a2b30}
.btn-primary:disabled{background:var(--faint);cursor:not-allowed}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--text)}
.btn-success{background:var(--yellow);color:var(--text);border:none}.btn-success:hover{background:var(--yellow-dark)}
.btn-sm{padding:7px 14px;font-size:13px;border-radius:8px;width:auto}
.btn-row{display:flex;gap:8px;margin-top:.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .7s linear infinite}

/* ── Item list ── */
.item-list{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem}
.item-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--surface)}
.item-row.removed{opacity:.4;background:var(--bg)}
.item-text{flex:1;font-size:14px;color:var(--text);outline:none;min-width:0;word-break:break-word}
.item-del{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--muted);font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;transition:all .15s}
.item-del:hover{background:var(--rl);border-color:var(--r);color:var(--rd)}
.item-restore{font-size:12px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--text);white-space:nowrap}
.add-item-row{display:flex;gap:8px;margin-bottom:1rem}
.add-item-row input{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);font-size:14px}
.add-item-row input:focus{outline:none;border-color:var(--text)}

/* ── Clarify cards ── */
.clarify-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:.875rem 1rem;margin-bottom:1rem}
.clarify-q{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px}
.clarify-opts{display:flex;flex-direction:column;gap:6px}
.clarify-opt{padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);font-size:14px;text-align:left;transition:all .15s;cursor:pointer}
.clarify-opt:hover,.clarify-opt.sel{border-color:var(--text);background:var(--yellow);color:var(--text);font-weight:600}

/* ── Meta row ── */
.meta-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}

/* ── Status bars ── */
.status-bar{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-radius:10px;font-size:13px;margin-bottom:1rem;line-height:1.5}
.status-ok{background:var(--gl);color:var(--gd);border:1px solid #9FE1CB}
.status-err{background:var(--rl);color:var(--rd);border:1px solid #F7C1C1}
.status-info{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.status-warn{background:var(--al);color:var(--ad);border:1px solid #FAC775}

/* ── v20 Label preview (monochrome 4×6 portrait) ── */

.v20-hd{display:flex;justify-content:space-between;align-items:flex-start}
.v20-hd-tag{font-size:11px;color:#555;letter-spacing:1px}
.v20-hd-num{font-size:58px;font-weight:700;line-height:.95;font-family:'Inter',monospace;letter-spacing:-2px;color:#000}
.v20-hd-tier{background:#000;color:#fff;padding:5px 12px 7px;display:flex;flex-direction:column;align-items:center;min-width:105px}
.v20-hd-tierletter{font-size:54px;font-weight:700;line-height:1}
.v20-hd-tiersub{font-size:9px;margin-top:2px;letter-spacing:.5px;text-align:center;line-height:1.15}
.v20-summary{text-align:center;font-size:22px;font-weight:700;letter-spacing:.3px;color:#000;line-height:1.2}
.v20-band{background:#000;color:#fff;padding:6px 14px;text-align:center;font-size:14px;font-weight:500;letter-spacing:1px;line-height:1.15}
.v20-fragile{border:2px solid #000;display:flex;align-items:stretch}
.v20-frag-side{width:44px;background:repeating-linear-gradient(45deg,#000 0 6px,#fff 6px 12px);display:flex;align-items:center;justify-content:center}
.v20-frag-tri{background:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#000}
.v20-frag-text{flex:1;background:#fff;padding:4px;text-align:center;line-height:1.1}
.v20-frag-main{font-size:16px;font-weight:700;letter-spacing:2px}
.v20-frag-sub{font-size:10px;letter-spacing:1.5px;margin-top:1px}

.v20-contents-body{column-count:2;column-gap:18px;font-size:12px;line-height:1.45;color:#000}

.v20-sw-lbl{color:#555;font-size:11px;letter-spacing:1px}

.v20-foot-right{text-align:right;font-size:11px;color:#555;line-height:1.5}
.v20-foot-sm{color:#555}
.v20-foot-who{color:#000;font-weight:700;font-size:13px}
.v20-foot-owners{color:#000;font-weight:600;font-size:12px;margin-bottom:3px}
.v20-deliver{font-size:11px;line-height:1.35;color:#000}
.v20-deliver .v20-sw-lbl{display:block;margin-bottom:1px}

/* ── Session registry (in-flow, below packing steps) ── */
.registry{margin-top:2rem;padding-top:1.25rem;border-top:1px solid var(--border)}
.reg-header{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.reg-counts{display:flex;gap:10px}
.reg-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:12px;margin-bottom:6px;background:var(--surface)}
.reg-dot{width:8px;height:8px;border-radius:3px;flex-shrink:0}
.reg-id{font-family:'Inter',monospace;font-size:12px;font-weight:700;min-width:42px;color:var(--text)}
.reg-desc{font-size:12px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.reg-n{font-size:11px;color:var(--faint)}

/* ── Info box ── */
.info-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.75rem 1rem;font-size:13px;color:var(--muted);margin-bottom:1rem;line-height:1.6}
.err-detail{background:#fff0f0;border:1px solid #F7C1C1;border-radius:10px;padding:10px 12px;font-size:11px;font-family:monospace;color:#A32D2D;margin-top:8px;word-break:break-all;line-height:1.6}

/* ── Google button / auth ── */
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px;border-radius:12px;border:1px solid var(--border);background:var(--surface);font-size:15px;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s}
.google-btn:hover{border-color:var(--text)}
.google-btn svg{flex-shrink:0}
.auth-badge{display:flex;align-items:center;gap:6px;font-size:12px;padding:5px 10px;border-radius:8px;background:var(--gl);color:var(--gd);border:1px solid #9FE1CB}
.settings-row{display:flex;align-items:center;gap:8px;padding:.5rem 0;border-bottom:1px solid var(--border);margin-bottom:.5rem}
.settings-label{font-size:13px;color:var(--muted);flex:1}
.key-input{font-family:monospace;font-size:12px;letter-spacing:.05em}

/* ── Menu (main screen) ── */
.menu-grid{display:flex;flex-direction:column;gap:10px;margin-top:.5rem}
.menu-card{display:flex;align-items:center;gap:14px;padding:16px;border:1px solid var(--border);border-radius:16px;background:var(--surface);cursor:pointer;transition:all .15s}
.menu-card:hover,.menu-card:active{border-color:var(--text);background:var(--bg)}
.menu-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.menu-label{font-size:15px;font-weight:700;color:var(--text)}
.menu-sub{font-size:12px;color:var(--muted);margin-top:2px}

/* ── Back link ── */
.back-link{display:inline-flex;align-items:center;gap:4px;font-size:13px;color:var(--muted);font-weight:600;cursor:pointer;margin-bottom:1rem;padding:4px 0}
.back-link:hover{color:var(--text)}
</style>
</head>

if(!CanvasRenderingContext2D.prototype.roundRect){

    if(w<2*r)r=w/2;if(h<2*r)r=h/2;
    this.beginPath();this.moveTo(x+r,y);
    this.arcTo(x+w,y,x+w,y+h,r);this.arcTo(x+w,y+h,x,y+h,r);

}

/* ── v20.1: session persistence.
   Survives app-switch / tab-suspend by snapshotting packing state to localStorage.
   Auto-resumes on load if user was mid-flow (step 0-2 with content). ── */

function saveSession(){
  try {
    // Only persist active packing sessions, not menu or registry browsing
    if(S.screen !== "pack") return;
    // Don't bother saving empty Step 0
    const hasProgress = S.step > 0 || S.desc || S.shortSummary || S.photos.length ||
                        S.items.length || S.originRoom;
    if(!hasProgress) return;
    // Build a snapshot without ephemeral / re-fetchable fields
    const snap = JSON.parse(JSON.stringify({
      screen: S.screen, step: S.step, mode: S.mode, tier: S.tier,
      dest: S.dest, desc: S.desc, shortSummary: S.shortSummary, fragile: S.fragile,
      packedBy: S.packedBy, weightKg: S.weightKg, boxSize: S.boxSize,
      originHome: S.originHome, originRoom: S.originRoom, owners: S.owners,
      photos: S.photos, items: S.items, removed: S.removed,
      itemCategories: S.itemCategories, itemValues: S.itemValues,
      itemValueSources: S.itemValueSources,
      singleValue: S.singleValue, singleValueSource: S.singleValueSource,
      singleCategory: S.singleCategory, singleDimensions: S.singleDimensions,
      clarifications: S.clarifications, clarifyIdx: S.clarifyIdx,
    }));
    try {
      localStorage.setItem(SESSION_KEY, JSON.stringify(snap));
    } catch(qerr) {
      // Quota exceeded (photos too big). Save again without photos.
      console.warn("Session quota exceeded — saving without photos");
      snap.photos = [];
      snap._photosLost = true;
      try { localStorage.setItem(SESSION_KEY, JSON.stringify(snap)); }
      catch(e2) { console.error("Session save still failing:", e2); }
    }
  } catch(e) { console.error("saveSession error:", e); }
}

function loadSession(){
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if(!raw) return null;
    return JSON.parse(raw);
  } catch(e) { console.error("loadSession error:", e); return null; }
}

function clearSession(){
  try { localStorage.removeItem(SESSION_KEY); } catch(e) {}
}

function q(s){return document.querySelector(s);}
function qq(s){return Array.from(document.querySelectorAll(s));}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function chunkItems(items,max){
  const lines=[];let line="";
  items.forEach(item=>{
    const seg=line?" · "+item:item;
    if((line+seg).length>max&&line){lines.push(line);line=item;}
    else line+=seg;
  });
  if(line)lines.push(line);
  return lines;
}
function updateTopStats(){
  const ca={A:0,B:0,C:0,D:0,E:0};S.registry.forEach(b=>{if(ca[b.tier]!==undefined)ca[b.tier]++;});

  const ai=document.getElementById("auth-indicator");

/* ── Load box detail from Supabase ── */
async function loadBoxDetail(boxId){
  S.detailLoading = true;
  S.detailItems = [];
  S.screen = "registry-detail";
  // Find registry entry for header info
  S.detailBox = S.registry.find(b => b.id === boxId) || {id: boxId, tier:"A", desc:"", dest:""};
  r(); // show loading state immediately

  const isItem = String(boxId).startsWith("I-");

  if(isItem){
    // Load standalone item from Supabase
    const {data, error} = await sb
      .from("standalone_items")
      .select("*")
      .eq("move_id", MOVE_ID)
      .eq("item_code", boxId)
      .single();

    if(!error && data){
      S.detailBox = {
        id: data.item_code, tier: data.tier, desc: data.description,
        shortSummary: data.short_summary || "",
        dest: data.destination_room, count: 1, mode: "item",
        fragile: data.is_fragile, packedBy: data.packed_by,
        packedAt: data.packed_at, valueCents: data.est_value_cents,
        valueSource: data.value_source, dimensions: data.dimensions,
        driveUrl: data.drive_folder_url,
        weightKg: data.weight_kg,
        originHome: data.origin_home, originRoom: data.origin_room,
        owners: data.owners || "",
      };
      S.detailItems = [{
        description: data.description, category: data.category,
        valueCents: data.est_value_cents, valueSource: data.value_source
      }];
    }
  } else {
    // Load box from Supabase — boxes now keyed by integer box_number
    const num = parseInt(boxId, 10);
    if(!Number.isFinite(num)){
      S.detailLoading = false;
      r();
      return;
    }
    const {data: box, error: boxErr} = await sb
      .from("boxes")
      .select("*")
      .eq("move_id", MOVE_ID)
      .eq("box_number", num)
      .single();

    if(!boxErr && box){
      S.detailBox = {
        id: String(box.box_number), tier: box.tier, desc: box.description,
        shortSummary: box.short_summary || "",
        dest: box.destination_room, count: box.item_count, mode: "box",
        fragile: box.is_fragile, packedBy: box.packed_by,
        packedAt: box.packed_at, valueCents: box.est_value_cents,
        driveUrl: box.drive_folder_url,
        weightKg: box.weight_kg, size: box.box_size,
        originHome: box.origin_home, originRoom: box.origin_room,
        owners: box.owners || "",
      };

      // Load items inside this box
      const {data: items, error: itemErr} = await sb
        .from("box_items")
        .select("item_number, category, description, quantity, est_value_cents, value_source")
        .eq("box_id", box.id)
        .order("item_number", {ascending: true});

      if(!itemErr && items){
        S.detailItems = items.map(i => ({
          number: i.item_number, description: i.description,
          category: i.category, quantity: i.quantity,
          valueCents: i.est_value_cents, valueSource: i.value_source
        }));
      }
    }
  }

  S.detailLoading = false;
  r();
}

// Format an ISO timestamp to "Apr 19, 2026 · 14:32"
function formatTimestamp(iso){
  try{
    const d = new Date(iso);
    if(isNaN(d.getTime())) return "";
    const m = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()];
    const day = d.getDate();
    const y = d.getFullYear();
    const hh = String(d.getHours()).padStart(2,"0");
    const mm = String(d.getMinutes()).padStart(2,"0");
    return `${m} ${day}, ${y} · ${hh}:${mm}`;
  }catch(e){return "";}
}

function vreg(){
  const rr=S.registry;if(!rr.length)return"";
  const ca={A:0,B:0,C:0,D:0,E:0};rr.forEach(b=>{if(ca[b.tier]!==undefined)ca[b.tier]++;});
  const tierCounts = TIER_KEYS.map(t=>`<span style="color:${TIER[t].dot};font-weight:700">${t}:${ca[t]}</span>`).join("");
  return`<div class="registry">
  <div class="reg-header"><span>Registry (${rr.length})</span>
    <div class="reg-counts">${tierCounts}</div>
  </div>
  ${[...rr].reverse().slice(0,8).map(b=>`<div class="reg-item">
    <div class="reg-dot" style="background:${(TIER[b.tier]||TIER.A).dot}"></div>
    <div class="reg-id">${esc(b.id)}</div>
    <div class="reg-desc">${esc(b.desc)}</div>
    <div class="reg-n" style="color:${b.mode==='item'?'var(--g)':'var(--faint)'}">${b.mode==='item'?'item':b.count}</div>
  </div>`).join("")}
  ${rr.length>8?`<div style="font-size:12px;color:#a0a0b8;text-align:center;padding:4px">+${rr.length-8} more</div>`:""}
</div>`;}

/* ── Event binding ── */
function bind(){
  // Menu navigation (v20: preserves session defaults for home/room/size/packedBy)
  q("#menu-pack")?.addEventListener("click",()=>{
    clearSession(); // v20.1: don't resume from saved state when user explicitly starts a new box
    S.screen="pack"; S.step=0;
    // Clear PER-BOX fields only — keep session defaults
    S.dest=""; S.desc=""; S.shortSummary=""; S.fragile=false;
    S.photos=[]; S.items=[]; S.removed=[];
    S.itemCategories={}; S.itemValues={}; S.itemValueSources={};
    S.singleValue=0; S.singleValueSource=""; S.singleCategory="Household"; S.singleDimensions="";
    S.clarifications=[]; S.clarifyIdx=0;
    S.boxId=""; S.boxNumber=null; S.packedAt=null;
    S.sheetResult=""; S.editingItem=null; S.driveFolderUrl=""; S.driveError="";
    S.weightKg=null;
    S.owners=[]; // v20.1: owners are per-box, not session-level
    // Preserved across boxes: S.tier, S.originHome, S.originRoom, S.boxSize, S.packedBy, S.mode
    // But default tier to A if this is the very first box of the session
    if(!S.tier) S.tier = "A";
    r();
  });
  q("#menu-registry")?.addEventListener("click",()=>{S.screen="registry";r();});
  q("#menu-docs")?.addEventListener("click",()=>{S.screen="documents";r();});
  q("#back-menu")?.addEventListener("click",()=>{S.screen="menu";r();});
  q("#back-registry")?.addEventListener("click",()=>{S.screen="registry";r();});
  q("#btn-reprint-label")?.addEventListener("click",reprintFromDetail);
  // Registry row clicks
  qq("[data-box-id]").forEach(el => {
    el.addEventListener("click", () => loadBoxDetail(el.dataset.boxId));
  });
  // Step 0
  q("#btn-save-key")?.addEventListener("click",()=>{
    const v=(q("#api-key-input")?.value||"").trim();
    if(v.startsWith("sk-ant-")){saveApiKey(v);r();}
    else toast("Key should start with sk-ant-");
  });
  q("#btn-clear-key")?.addEventListener("click",()=>{localStorage.removeItem("anthropic_key");r();});
  q("#btn-mode-box")?.addEventListener("click",()=>{S.mode="box";r();});
  q("#btn-mode-item")?.addEventListener("click",()=>{S.mode="item";r();});
  q("#btn-next0")?.addEventListener("click",()=>{
    if(!getApiKey()){ toast("Save your API key first"); return; }
    // Destination room is now optional — origin is what matters at pack time.
    S.step=1; r();
  });
  q("#f-dest")?.addEventListener("input",e=>{S.dest=e.target.value;});
  q("#f-desc")?.addEventListener("input",e=>S.desc=e.target.value);
  q("#f-fragile")?.addEventListener("change",e=>S.fragile=e.target.checked);
  q("#f-weight")?.addEventListener("input",e=>{
    const v = parseFloat(e.target.value);
    S.weightKg = Number.isFinite(v) && v >= 0 ? v : null;
  });
  q("#pb-marco")?.addEventListener("click",()=>{S.packedBy="Marco";r();});
  q("#pb-geetha")?.addEventListener("click",()=>{S.packedBy="Geetha";r();});
  // v20.1: owner multi-select (toggle each button)
  qq(".owner-btn").forEach(el=>{
    el.addEventListener("click", ()=>{
      const name = el.dataset.owner;
      if(!S.owners) S.owners = [];
      const idx = S.owners.indexOf(name);
      if(idx === -1) S.owners.push(name);
      else S.owners.splice(idx, 1);
      r();
    });
  });
  // Tier buttons (v20: A–E)
  TIER_KEYS.forEach(t=>q("#tb-"+t)?.addEventListener("click",()=>{S.tier=t;r();}));
  // Origin home picker
  ORIGIN_HOMES.forEach(h=>{
    const id = "#oh-" + h.replace(/\s+/g,"-");
    q(id)?.addEventListener("click", ()=>{
      S.originHome = h;
      // Reset room when switching homes unless new home has the current room
      const rooms = S.originRoomsByHome[h] || [];
      if(!rooms.includes(S.originRoom)) S.originRoom = "";
      r();
    });
  });
  // Room chips
  qq(".room-chip").forEach(el => {
    el.addEventListener("click", () => { S.originRoom = el.dataset.room; r(); });
  });
  // Add new room
  q("#btn-add-room")?.addEventListener("click", async ()=>{
    const input = q("#f-new-room");
    if(!input) return;
    const name = input.value.trim();
    if(!name){ toast("Enter a room name first"); return; }
    const ok = await addOriginRoom(S.originHome, name);
    if(ok){ S.originRoom = name; r(); }
  });
  q("#f-new-room")?.addEventListener("keydown",e=>{
    if(e.key==="Enter"){ e.preventDefault(); q("#btn-add-room")?.click(); }
  });
  // Box size buttons
  ["Small","Medium","Large"].forEach(sz=>q("#sz-"+sz)?.addEventListener("click",()=>{S.boxSize=sz;r();}));
  q("#btn-google-auth")?.addEventListener("click",startGoogleAuth);
  q("#btn-test-key")?.addEventListener("click",testApiKey);
  // Step 1
  q("#btn-back1")?.addEventListener("click",()=>{S.step=0;r();});
  q("#btn-analyze")?.addEventListener("click",analyze);
  q("#drop-zone")?.addEventListener("click",()=>q("#file-input").click());
  q("#add-more")?.addEventListener("click",()=>q("#file-input").click());
  q("#file-input")?.addEventListener("change",e=>handleFiles(e.target.files));
  qq(".photo-del").forEach(b=>b.addEventListener("click",()=>{const i=+b.dataset.i;S.photos.splice(i,1);r();}));
  const dz=q("#drop-zone");
  if(dz){dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("drag");});dz.addEventListener("dragleave",()=>dz.classList.remove("drag"));dz.addEventListener("drop",e=>{e.preventDefault();dz.classList.remove("drag");handleFiles(e.dataTransfer.files);});}
  // Step 2
  q("#btn-back2")?.addEventListener("click",()=>{S.step=1;r();});
  q("#btn-confirm")?.addEventListener("click",confirmBox);
  q("#btn-add")?.addEventListener("click",addItem);
  q("#new-item")?.addEventListener("keydown",e=>{if(e.key==="Enter")addItem();});
  q("#f-summary")?.addEventListener("input",e=>S.shortSummary=e.target.value);
  q("#f-desc2")?.addEventListener("input",e=>S.desc=e.target.value);
  q("#f-dest2")?.addEventListener("input",e=>S.dest=e.target.value);
  q("#f-weight2")?.addEventListener("input",e=>{
    const v = parseFloat(e.target.value);
    S.weightKg = Number.isFinite(v) && v >= 0 ? v : null;
  });
  qq("[data-di]").forEach(b=>b.addEventListener("click",()=>{S.removed.push(+b.dataset.di);r();}));
  qq("[data-ri]").forEach(b=>b.addEventListener("click",()=>{S.removed=S.removed.filter(x=>x!==+b.dataset.ri);r();}));
  qq("[data-ci]").forEach(b=>b.addEventListener("click",()=>{S.clarifyIdx=+b.dataset.ci+1;r();}));
  qq(".item-edit-btn").forEach(b=>b.addEventListener("click",()=>openEdit(+b.dataset.ei)));
  // Step 4
  q("#btn-dl")?.addEventListener("click",downloadLabel);
  q("#btn-print1")?.addEventListener("click",()=>printLabel(1));
  q("#btn-print2")?.addEventListener("click",()=>printLabel(2));
  q("#btn-print4")?.addEventListener("click",()=>printLabel(4));
  q("#btn-next-box")?.addEventListener("click",nextBox);
  q("#btn-back-menu")?.addEventListener("click",()=>{
    if(S.detailBox && S.detailBox.id === S.boxId){
      // Came from reprint — go back to detail view
      loadBoxDetail(S.detailBox.id);
    } else {
      clearSession(); // v20.1: user finished with this box
      S.screen="menu";S.step=0;r();
    }
  });
  if(S.step===4)setTimeout(drawQR,50);
}

/* ── Google OAuth ── */
function startGoogleAuth(){
  if(!window.google){toast("Google Sign-In library not loaded yet — try again in a moment");return;}
  const client=google.accounts.oauth2.initTokenClient({
    client_id:GOOGLE_CLIENT_ID,
    scope:SCOPES,
    prompt:"consent",
    callback:(resp)=>{
      if(resp.error){toast("Google auth failed: "+resp.error);return;}
      googleToken=resp.access_token;
      fetchGoogleUserInfo();
    }
  });
  client.requestAccessToken({prompt:"consent"});
}

async function fetchGoogleUserInfo(){
  try{
    const resp=await fetch("https://www.googleapis.com/oauth2/v3/userinfo",{headers:{Authorization:"Bearer "+googleToken}});
    const data=await resp.json();
    googleUser=data.email||data.name||"connected";
    toast("Google Sheets connected");
    r();
  }catch(e){googleUser="connected";r();}
}

/* ── Write to Google Sheets ── */
async function writeToSheet(){
  if(!googleToken){S.sheetResult="skip";S.step=4;r();setTimeout(drawQR,50);return;}
  const active=S.items.filter((_,i)=>!S.removed.includes(i));
  const today=new Date().toLocaleDateString("en-GB");
  try{
    // Upload photos to Drive first so we have the folder URL for the sheet
    let driveFolderUrl = "";
    let driveFolderId = "";
    if(S.photos.length > 0){
      try{
        const folderId = await getOrCreateFolder(S.boxId);
        driveFolderId = folderId;
        driveFolderUrl = "https://drive.google.com/drive/folders/" + folderId;
        S.driveFolderUrl = driveFolderUrl;
        await uploadPhotosToDrive(folderId);
      }catch(de){console.warn("Drive upload failed:",de.message);S.driveError=de.message;}
    }
    // Ensure headers exist on first write
    await ensureHeaders();
    // Get current row counts so we know where new data lands
    const regInfo = await getSheetInfo(REGISTRY_SHEET);
    const itemInfo = await getSheetInfo(ITEMS_SHEET);
    const regStartRow = regInfo.rowCount + 1;
    const itemStartRow = itemInfo.rowCount + 1;
    // Append data — include Drive folder URL in registry row
    const t = TIER[S.tier] || TIER.A;
    const photosCell = driveFolderUrl ? `=HYPERLINK("${driveFolderUrl}","📷 View photos")` : "";
    // v20.1: include short_summary, origin, size, weight, owners in the sheet row (15 cols)
    const regRow=[[
      S.boxId, S.tier, t.name,
      S.shortSummary || "",
      S.desc || "",
      [S.originHome, S.originRoom].filter(Boolean).join(" · "),
      S.dest || "",
      S.boxSize || "",
      S.weightKg != null ? Number(S.weightKg).toFixed(1) : "",
      (S.owners && S.owners.length) ? S.owners.join(", ") : "",
      active.length, S.fragile?"Yes":"No", today,
      SHEET_URL+"&box="+encodeURIComponent(S.boxId), photosCell
    ]];
    await sheetsAppend(REGISTRY_SHEET, regRow);
    const itemRows=active.map((item,i)=>[S.boxId, i+1, S.itemCategories?.[i]||getCategory(item), item, 1, ""]);
    if(itemRows.length) await sheetsAppend(ITEMS_SHEET, itemRows);
    // Format the new rows (non-fatal if fails)
    try{
      const regSheetId = await getSheetId(REGISTRY_SHEET);
      const itemSheetId = await getSheetId(ITEMS_SHEET);
      await formatNewRows(regSheetId, regStartRow-1, S.tier, false);
      if(itemRows.length) await formatNewRows(itemSheetId, itemStartRow-1, S.tier, true);
    }catch(fe){console.warn("Formatting failed (data still saved):",fe.message);}
    S.sheetResult="ok";
  }catch(e){
    S.sheetResult=e.message||"unknown error";
  }
  S.step=4;r();setTimeout(drawQR,50);
}

async function getSheetInfo(sheetName){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/'${sheetName}'!A:A`;
  const resp=await fetch(url,{headers:{"Authorization":"Bearer "+googleToken}});
  if(!resp.ok) return {rowCount:1};
  const data=await resp.json();
  return {rowCount:(data.values||[]).length};
}

async function getSheetId(sheetName){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}?fields=sheets.properties`;
  const resp=await fetch(url,{headers:{"Authorization":"Bearer "+googleToken}});
  const data=await resp.json();
  const found=(data.sheets||[]).find(s=>s.properties.title===sheetName);
  return found?found.properties.sheetId:0;
}

async function ensureHeaders(){
  // Check if Box Registry has headers
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/'${REGISTRY_SHEET}'!A1:A2`;
  const resp=await fetch(url,{headers:{"Authorization":"Bearer "+googleToken}});
  const data=await resp.json();
  // Check if either row 1 or row 2 has "Box ID" (handles both with and without title row)
  const vals=data.values||[];
  const hasHeader=vals.some(row=>row[0]==="Box ID");
  if(hasHeader) return;
  // Write headers to both sheets
  const regHeaders=[["Box ID","Tier","Tier Name","Short Summary","Description","Packed From","Destination","Size","Weight (kg)","Belongs To","# Items","Fragile?","Date Packed","Inventory QR URL","Photos (Drive)"]];
  const itemHeaders=[["Box ID","Item #","Category","Item Description","Qty","Est. Value (USD)","Value Source","Notes"]];
  await sheetsUpdate(REGISTRY_SHEET,"A1",regHeaders);
  await sheetsUpdate(ITEMS_SHEET,"A1",itemHeaders);
  // Format header rows
  const regId=await getSheetId(REGISTRY_SHEET);
  const itemId=await getSheetId(ITEMS_SHEET);
  await formatHeaderRow(regId,15);
  await formatHeaderRow(itemId,8);
  // Check/create Item Registry

    {headers:{"Authorization":"Bearer "+googleToken}});
  const irData=await irCheck.json();
  const irHasHeader=(irData.values||[]).some(r=>r[0]==="Item ID");
  if(!irHasHeader){
    const irHeaders=[["Item ID","Tier","Tier Name","Category","Description","Destination","Dimensions","Fragile?","Est. Value (USD)","Value Source","Packed By","Date Packed","Photos (Drive)","Notes"]];
    await sheetsUpdate(ITEM_REGISTRY_SHEET,"A1",irHeaders);
    const irId=await getSheetId(ITEM_REGISTRY_SHEET);
    await formatHeaderRow(irId,14);
    await batchUpdate([
      {updateDimensionProperties:{range:{sheetId:irId,dimension:"COLUMNS",startIndex:0,endIndex:1},properties:{pixelSize:70},fields:"pixelSize"}},
      {updateDimensionProperties:{range:{sheetId:irId,dimension:"COLUMNS",startIndex:1,endIndex:2},properties:{pixelSize:55},fields:"pixelSize"}},
      {updateDimensionProperties:{range:{sheetId:irId,dimension:"COLUMNS",startIndex:2,endIndex:3},properties:{pixelSize:120},fields:"pixelSize"}},
      {updateDimensionProperties:{range:{sheetId:irId,dimension:"COLUMNS",startIndex:3,endIndex:4},properties:{pixelSize:120},fields:"pixelSize"}},
      {updateDimensionProperties:{range:{sheetId:irId,dimension:"COLUMNS",startIndex:4,endIndex:5},properties:{pixelSize:220},fields:"pixelSize"}},
      {updateDimensionProperties:{range:{sheetId:irId,dimension:"COLUMNS",startIndex:5,endIndex:6},properties:{pixelSize:140},fields:"pixelSize"}},
      {updateDimensionProperties:{range:{sheetId:irId,dimension:"COLUMNS",startIndex:6,endIndex:7},properties:{pixelSize:140},fields:"pixelSize"}},
      {updateDimensionProperties:{range:{sheetId:irId,dimension:"COLUMNS",startIndex:7,endIndex:8},properties:{pixelSize:70},fields:"pixelSize"}},
      {updateDimensionProperties:{range:{sheetId:irId,dimension:"COLUMNS",startIndex:8,endIndex:9},properties:{pixelSize:110},fields:"pixelSize"}},
      {updateDimensionProperties:{range:{sheetId:irId,dimension:"COLUMNS",startIndex:9,endIndex:10},properties:{pixelSize:100},fields:"pixelSize"}},
      {updateDimensionProperties:{range:{sheetId:irId,dimension:"COLUMNS",startIndex:10,endIndex:11},properties:{pixelSize:200},fields:"pixelSize"}},
      {updateDimensionProperties:{range:{sheetId:irId,dimension:"COLUMNS",startIndex:11,endIndex:12},properties:{pixelSize:200},fields:"pixelSize"}},
    ]);
  }
  // Set column widths for Box Registry
  await batchUpdate([
    {updateDimensionProperties:{range:{sheetId:regId,dimension:"COLUMNS",startIndex:0,endIndex:1},properties:{pixelSize:70},fields:"pixelSize"}},
    {updateDimensionProperties:{range:{sheetId:regId,dimension:"COLUMNS",startIndex:1,endIndex:2},properties:{pixelSize:55},fields:"pixelSize"}},
    {updateDimensionProperties:{range:{sheetId:regId,dimension:"COLUMNS",startIndex:2,endIndex:3},properties:{pixelSize:130},fields:"pixelSize"}},
    {updateDimensionProperties:{range:{sheetId:regId,dimension:"COLUMNS",startIndex:3,endIndex:4},properties:{pixelSize:240},fields:"pixelSize"}},
    {updateDimensionProperties:{range:{sheetId:regId,dimension:"COLUMNS",startIndex:4,endIndex:5},properties:{pixelSize:150},fields:"pixelSize"}},
    {updateDimensionProperties:{range:{sheetId:regId,dimension:"COLUMNS",startIndex:5,endIndex:6},properties:{pixelSize:60},fields:"pixelSize"}},
    {updateDimensionProperties:{range:{sheetId:regId,dimension:"COLUMNS",startIndex:6,endIndex:7},properties:{pixelSize:70},fields:"pixelSize"}},
    {updateDimensionProperties:{range:{sheetId:regId,dimension:"COLUMNS",startIndex:7,endIndex:8},properties:{pixelSize:100},fields:"pixelSize"}},
    {updateDimensionProperties:{range:{sheetId:regId,dimension:"COLUMNS",startIndex:8,endIndex:9},properties:{pixelSize:110},fields:"pixelSize"}},

async function sheetsUpdate(sheetName,range,values){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/'${sheetName}'!${range}?valueInputOption=USER_ENTERED`;
  const resp=await fetch(url,{method:"PUT",headers:{"Authorization":"Bearer "+googleToken,"Content-Type":"application/json"},body:JSON.stringify({values})});
  if(!resp.ok){const e=await resp.text();throw new Error(resp.status+": "+e.slice(0,200));}
  return resp.json();
}

async function formatHeaderRow(sheetId, numCols){
  // Row index 1 = second row (0-indexed) because row 0 is the title row
  const requests=[{
    repeatCell:{
      range:{sheetId,startRowIndex:1,endRowIndex:2,startColumnIndex:0,endColumnIndex:numCols},
      cell:{userEnteredFormat:{
        backgroundColor:{red:0.118,green:0.118,blue:0.180},
        textFormat:{bold:true,fontSize:10,foregroundColor:{red:1.0,green:1.0,blue:1.0}},
        horizontalAlignment:"CENTER",
        verticalAlignment:"MIDDLE",
        wrapStrategy:"CLIP"
      }},
      fields:"userEnteredFormat(backgroundColor,textFormat,horizontalAlignment,verticalAlignment,wrapStrategy)"
    }
  },{
    updateDimensionProperties:{
      range:{sheetId,dimension:"ROWS",startIndex:1,endIndex:2},
      properties:{pixelSize:28},
      fields:"pixelSize"
    }
  }];
  await batchUpdate(requests);
}

const TIER_COLORS={
  A:{r:0.882,g:0.961,b:0.933},
  B:{r:0.980,g:0.933,b:0.855},
  C:{r:0.933,g:0.929,b:0.996},
};
const TIER_TEXT_COLORS={
  A:{r:0.059,g:0.431,b:0.337},
  B:{r:0.522,g:0.310,b:0.043},
  C:{r:0.235,g:0.204,b:0.549},
};

async function formatNewRows(sheetId, startRowIndex, tier, isItemSheet){
  const bg = TIER_COLORS[tier] || TIER_COLORS.C;
  const tc = TIER_TEXT_COLORS[tier] || TIER_TEXT_COLORS.C;
  const numCols = isItemSheet ? 6 : 10;
  const requests = [
    // Row background + base formatting
    {repeatCell:{
      range:{sheetId,startRowIndex,endRowIndex:startRowIndex+1,startColumnIndex:0,endColumnIndex:numCols},
      cell:{userEnteredFormat:{
        backgroundColor:{red:bg.r,green:bg.g,blue:bg.b},
        verticalAlignment:"MIDDLE",
        wrapStrategy:"WRAP",
        textFormat:{fontSize:10,foregroundColor:{red:0.1,green:0.1,blue:0.1}}
      }},
      fields:"userEnteredFormat(backgroundColor,verticalAlignment,wrapStrategy,textFormat)"
    }},
    // Box ID cell — bold monospace in tier color
    {repeatCell:{
      range:{sheetId,startRowIndex,endRowIndex:startRowIndex+1,startColumnIndex:0,endColumnIndex:1},
      cell:{userEnteredFormat:{
        textFormat:{bold:true,fontSize:11,fontFamily:"Courier New",foregroundColor:{red:tc.r,green:tc.g,blue:tc.b}},
        horizontalAlignment:"CENTER"
      }},
      fields:"userEnteredFormat(textFormat,horizontalAlignment)"
    }},
    // Tier cell — bold in tier color, centered
    {repeatCell:{
      range:{sheetId,startRowIndex,endRowIndex:startRowIndex+1,startColumnIndex:1,endColumnIndex:2},
      cell:{userEnteredFormat:{
        textFormat:{bold:true,foregroundColor:{red:tc.r,green:tc.g,blue:tc.b}},
        horizontalAlignment:"CENTER"
      }},
      fields:"userEnteredFormat(textFormat,horizontalAlignment)"
    }},
    // Item # cell on item sheet — bold in tier color, centered
    ...(isItemSheet ? [{repeatCell:{
      range:{sheetId,startRowIndex,endRowIndex:startRowIndex+1,startColumnIndex:1,endColumnIndex:2},
      cell:{userEnteredFormat:{
        textFormat:{bold:true,foregroundColor:{red:tc.r,green:tc.g,blue:tc.b}},
        horizontalAlignment:"CENTER"
      }},
      fields:"userEnteredFormat(textFormat,horizontalAlignment)"
    }}] : []),
    // Row height
    {updateDimensionProperties:{
      range:{sheetId,dimension:"ROWS",startIndex:startRowIndex,endIndex:startRowIndex+1},
      properties:{pixelSize:isItemSheet?20:48},
      fields:"pixelSize"
    }}
  ];
  await batchUpdate(requests);
}

/* ── Google Drive helpers ── */
async function getOrCreateFolder(boxId){
  // Find or create root "Aachen Move" folder
  const rootId = await findOrMakeFolder(ROOT_FOLDER_NAME, "root");
  // Find or create box subfolder inside it
  const boxFolderId = await findOrMakeFolder(boxId, rootId);
  return boxFolderId;
}

async function findOrMakeFolder(name, parentId){
  // Search for existing folder
  const q = encodeURIComponent(`name='${name}' and mimeType='application/vnd.google-apps.folder' and '${parentId}' in parents and trashed=false`);
  const resp = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`,{
    headers:{"Authorization":"Bearer "+googleToken}
  });
  if(!resp.ok){const e=await resp.text();throw new Error("Drive search "+resp.status+": "+e.slice(0,150));}
  const data = await resp.json();
  if(data.files && data.files.length > 0) return data.files[0].id;
  // Create it
  const createResp = await fetch("https://www.googleapis.com/drive/v3/files",{
    method:"POST",
    headers:{"Authorization":"Bearer "+googleToken,"Content-Type":"application/json"},
    body:JSON.stringify({
      name, mimeType:"application/vnd.google-apps.folder",
      parents:[parentId]
    })
  });
  if(!createResp.ok){const e=await createResp.text();throw new Error("Drive mkdir "+createResp.status+": "+e.slice(0,150));}
  const created = await createResp.json();
  return created.id;
}

async function uploadPhotosToDrive(folderId){
  for(let i=0;i<S.photos.length;i++){
    const dataUrl = S.photos[i];
    const [meta, b64] = dataUrl.split(",");
    const mimeType = meta.match(/:(.*?);/)[1];
    const ext = mimeType.includes("png") ? "png" : "jpg";
    const filename = `${S.boxId}_photo${i+1}.${ext}`;
    // Convert base64 to blob
    const byteStr = atob(b64);
    const arr = new Uint8Array(byteStr.length);
    for(let j=0;j<byteStr.length;j++) arr[j]=byteStr.charCodeAt(j);
    const blob = new Blob([arr],{type:mimeType});
    // Multipart upload
    const boundary = "bound" + Date.now();
    const metaPart = JSON.stringify({name:filename,parents:[folderId]});
    const formData = new FormData();
    formData.append("metadata", new Blob([metaPart],{type:"application/json"}));
    formData.append("file", blob, filename);
    const uploadResp = await fetch(
      "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name",{
        method:"POST",
        headers:{"Authorization":"Bearer "+googleToken},
        body:formData
      }
    );
    if(!uploadResp.ok){const e=await uploadResp.text();console.warn("Photo upload failed:",e.slice(0,100));}
  }
}

async function sheetsAppend(sheetName,values){
  // First verify we can read the spreadsheet at all
  const checkUrl=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}?fields=sheets.properties`;
  const check=await fetch(checkUrl,{headers:{"Authorization":"Bearer "+googleToken}});
  if(!check.ok){
    const e=await check.text();
    throw new Error("Cannot access spreadsheet ("+check.status+"): "+e.slice(0,200));
  }
  const meta=await check.json();
  // Find the sheet tab by name
  const sheets=meta.sheets||[];
  const found=sheets.find(s=>s.properties.title===sheetName);
  if(!found){
    const names=sheets.map(s=>s.properties.title).join(", ");
    throw new Error(`Tab "${sheetName}" not found. Tabs in this sheet: ${names}`);
  }
  // Append using the confirmed tab name
  const range=`'${sheetName}'!A1`;
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`;
  const resp=await fetch(url,{
    method:"POST",
    headers:{"Authorization":"Bearer "+googleToken,"Content-Type":"application/json"},
    body:JSON.stringify({values})
  });
  if(!resp.ok){const e=await resp.text();throw new Error(resp.status+": "+e.slice(0,300));}
  return resp.json();
}

function compressImage(file,maxPx,quality){
  return new Promise(resolve=>{
    const rd=new FileReader();
    rd.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>maxPx||h>maxPx){
          if(w>h){h=Math.round(h*maxPx/w);w=maxPx;}
          else{w=Math.round(w*maxPx/h);h=maxPx;}
        }
        const cv=document.createElement("canvas");
        cv.width=w;cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        resolve(cv.toDataURL("image/jpeg",quality));
      };
      img.src=e.target.result;
    };
    rd.readAsDataURL(file);
  });
}

// v20: boxes are now numbered globally (integer), not per-tier.
// Returns next integer (1, 2, 3…). On DB error returns null so caller can surface it.
async function getNextBoxNumber(){
  const {data, error} = await sb
    .from("boxes")
    .select("box_number")
    .eq("move_id", MOVE_ID)
    .not("box_number", "is", null)
    .order("box_number", {ascending: false})
    .limit(1);

  if(error){ console.error("Supabase getNextBoxNumber error:", error); return null; }
  const max = (data && data[0] && Number.isFinite(data[0].box_number)) ? data[0].box_number : 0;
  return max + 1;
}

// Standalone items keep the "I-NN" code format (visually distinct from box numbers).
async function getNextItemCode(){
  const {data, error} = await sb
    .from("standalone_items")
    .select("item_code")
    .eq("move_id", MOVE_ID);

  if(error){ console.error("Supabase getNextItemCode error:", error); return null; }

  let max = 0;
  (data||[]).forEach(row => {
    const parts = String(row.item_code||"").split("-");
    const num = parseInt(parts[1], 10);
    if(Number.isFinite(num) && num > max) max = num;
  });
  return "I-" + String(max + 1).padStart(2, "0");
}

// Add a new origin room to Supabase + local cache.
async function addOriginRoom(home, roomName){
  const name = (roomName||"").trim();
  if(!name) return false;
  // Optimistic local add
  if(!S.originRoomsByHome[home]) S.originRoomsByHome[home] = [];
  if(!S.originRoomsByHome[home].includes(name)){

/* ── Supabase: save box + items to database.
   Returns true on success, false on any write failure so confirmBox can surface it. ── */
async function saveBoxToSupabase(){
  const active = S.items.filter((_,i) => !S.removed.includes(i));
  // totalCents: sum over the ORIGINAL indices of kept items
  let totalCents = 0;
  S.items.forEach((_, idx) => {
    if(S.removed.includes(idx)) return;
    totalCents += Math.round((S.itemValues?.[idx] || 0) * 100);
  });

  const packedAtIso = S.packedAt || new Date().toISOString();

  if(S.mode === "item"){
    // Save standalone item
    const {error} = await sb.from("standalone_items").insert({
      move_id: MOVE_ID,
      item_code: S.boxId,
      tier: S.tier,
      category: S.singleCategory || "Household",
      description: S.desc || S.items[0] || "Standalone item",
      short_summary: S.shortSummary || null,
      destination_room: S.dest || null,
      dimensions: S.singleDimensions || null,
      is_fragile: S.fragile,
      packed_by: S.packedBy,
      packed_at: packedAtIso.slice(0,10),
      est_value_cents: Math.round((S.singleValue || 0) * 100),
      value_source: S.singleValueSource || null,
      value_source_type: S.singleValueSource ? "ai_estimate" : "not_set",
      weight_kg: S.weightKg != null ? Number(S.weightKg) : null,
      origin_home: S.originHome || null,
      origin_room: S.originRoom || null,
      owners: (S.owners && S.owners.length) ? S.owners.join(", ") : null,
    });
    if(error){ console.error("Supabase standalone_items error:", error); return false; }
    return true;
  }

  // Save box (v20: box_number integer, plus new metadata)
  const {data: boxData, error: boxErr} = await sb.from("boxes").insert({
    move_id: MOVE_ID,
    box_number: S.boxNumber,
    tier: S.tier,
    description: S.desc || null,
    short_summary: S.shortSummary || null,
    destination_room: S.dest || null,
    is_fragile: S.fragile,
    packed_by: S.packedBy,
    packed_at: packedAtIso.slice(0,10),
    est_value_cents: totalCents,
    item_count: active.length,
    weight_kg: S.weightKg != null ? Number(S.weightKg) : null,
    box_size: S.boxSize || null,
    origin_home: S.originHome || null,
    origin_room: S.originRoom || null,
    owners: (S.owners && S.owners.length) ? S.owners.join(", ") : null,
  }).select("id").single();

  if(boxErr){ console.error("Supabase box error:", boxErr); return false; }

  // Save each item inside the box
  const itemRows = [];
  let displayIdx = 0;
  S.items.forEach((item, origIdx) => {
    if(S.removed.includes(origIdx)) return;
    displayIdx += 1;
    itemRows.push({
      box_id: boxData.id,
      move_id: MOVE_ID,
      item_number: displayIdx,
      category: S.itemCategories?.[origIdx] || "Other",
      description: item,
      quantity: 1,
      est_value_cents: Math.round((S.itemValues?.[origIdx] || 0) * 100),
      value_source: S.itemValueSources?.[origIdx] || null,
      value_source_type: S.itemValueSources?.[origIdx] ? "ai_estimate" : "not_set",
    });
  });

  if(itemRows.length > 0){
    const {error: itemErr} = await sb.from("box_items").insert(itemRows);
    if(itemErr){ console.error("Supabase box_items error:", itemErr); return false; }
  }
  return true;
}

/* ── Supabase: load existing boxes + items into registry on startup ── */

      .from("boxes")
      .select("box_number, box_code, tier, description, short_summary, destination_room, item_count, owners")

      .order("created_at", {ascending: true});

    const {data: items, error: itemErr} = await sb
      .from("standalone_items")
      .select("item_code, tier, description, short_summary, destination_room, owners")
      .eq("move_id", MOVE_ID)
      .order("created_at", {ascending: true});

    if(itemErr){ console.error("Failed to load items:", itemErr); return; }

    // Build the registry array from database results
    S.registry = [];
    (boxes || []).forEach(b => {
      // v20: prefer box_number, fall back to box_code for any legacy rows.
      const id = (b.box_number != null) ? String(b.box_number) : (b.box_code || "?");
      S.registry.push({
        id,
        tier: b.tier,
        desc: b.short_summary || b.description || "",
        dest: b.destination_room || "",
        count: b.item_count || 0,
        mode: "box"
      });
    });
    (items || []).forEach(item => {
      S.registry.push({
        id: item.item_code,
        tier: item.tier,
        desc: item.short_summary || item.description || "",
        dest: item.destination_room || "",
        count: 1,
        mode: "item"
      });
    });

    // Re-render so the registry panel shows the loaded data
    r();
    console.log(`Registry loaded: ${boxes?.length || 0} boxes, ${items?.length || 0} standalone items`);
  } catch(e){
    console.error("Registry load error:", e);
  }
}

/* ── Confirm & save (v20: surfaces Supabase failures, sets timestamp) ── */
async function confirmBox(){
  // Guard: prevent double-submission while save is in flight
  const confirmBtn = q("#btn-confirm");
  if(confirmBtn) confirmBtn.disabled = true;

  // Set the packed timestamp once, at confirm time
  S.packedAt = new Date().toISOString();

  // Get the next ID
  if(S.mode === "item"){
    const code = await getNextItemCode();
    if(!code){
      toast("Couldn't get next item code — check connection");
      if(confirmBtn) confirmBtn.disabled = false;
      return;
    }
    S.boxId = code;
    S.boxNumber = null;
  } else {
    const num = await getNextBoxNumber();
    if(num == null){
      toast("Couldn't get next box number — check connection");
      if(confirmBtn) confirmBtn.disabled = false;
      return;
    }
    S.boxNumber = num;
    S.boxId = String(num);
  }

  // Show saving screen
  S.step = 3;
  r();

  // Save to Supabase (source of truth) — await result
  const ok = await saveBoxToSupabase();
  if(!ok){
    S.sheetResult = "supa-fail";
    S.step = 4;
    r();
    setTimeout(drawQR, 50);
    return;
  }

  // v20.1: saved OK — drop the session snapshot so a later crash doesn't re-open this box
  clearSession();

  // Push to local registry
  const active = S.items.filter((_,i) => !S.removed.includes(i));
  S.registry.push({
    id: S.boxId, tier: S.tier,
    desc: S.shortSummary || S.desc,
    dest: S.dest,
    count: S.mode === "item" ? 1 : active.length,
    mode: S.mode
  });

  // Fire Sheets write if connected — non-blocking, result is cosmetic only
  if(googleToken){
    writeToSheet().catch(e => {
      console.error("writeToSheet failed:", e);
      S.sheetResult = e.message || "sheets error";
      if(S.step === 4) r();
    });
  } else {
    // Already saved to Supabase — skip sheets, show success
    S.sheetResult = "supa-ok";
    S.step = 4;
    r();
    setTimeout(drawQR, 50);
  }
}

/* ── Print label via Web Share → Brother iPrint&Label ── */
async function printLabel(copies){
  toast("Rendering label…");
  try{
    const dataUrl = await renderLabelToCanvas(copies);
    const blob = await (await fetch(dataUrl)).blob();
    const file = new File([blob], `label_${S.boxId}_${copies}x.png`, {type:"image/png"});

    if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({
        title: `Label ${S.boxId} — ${copies} cop${copies===1?"y":"ies"}`,
        text: `Box ${S.boxId} · ${S.desc} · ${S.dest}`,
        files:[file]
      });
    } else if(navigator.share){
      // Fallback: share without file (older Android)
      const url = URL.createObjectURL(blob);
      await navigator.share({title:`Label ${S.boxId}`, url});
      setTimeout(()=>URL.revokeObjectURL(url), 5000);
    } else {
      // Desktop fallback: download PNG
      const a = document.createElement("a");
      a.href = dataUrl;
      a.download = `label_${S.boxId}_${copies}x.png`;
      a.click();
      toast("Web Share not supported — PNG downloaded instead");
    }
  }catch(e){
    if(e.name!=="AbortError") toast("Share failed: "+e.message);
  }
}

async function renderLabelToCanvas(copies){
  // v20.1.1: logical 4×6 portrait at 203 DPI (812×1218 logical px)
  // Canvas is rendered at 2× pixel density (1624×2436) for sharper thermal prints —
  // the printer downsamples but edge detail is preserved.
  const LW = 812, LH = 1218;
  const DPR = 2;           // device pixel ratio multiplier for print quality
  const MARGIN = 24;       // inter-label gutter (logical px)
  const PAD = 24;          // outer page padding (logical px)
  const cols = copies === 4 ? 2 : 1;
  const rows = copies === 4 ? 2 : copies;
  const CW = LW * cols + MARGIN * (cols - 1);
  const CH = LH * rows + MARGIN * (rows - 1);

  const cv = document.createElement("canvas");
  cv.width = (CW + PAD*2) * DPR;
  cv.height = (CH + PAD*2) * DPR;
  const ctx = cv.getContext("2d");
  ctx.scale(DPR, DPR);     // all draw calls now in logical coordinates, 2× output
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";

  // White background
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, CW + PAD*2, CH + PAD*2);

  // Pre-fetch QR at 400×400 (larger source for supersampled scale down)
  const qrUrl = SHEET_URL + "&box=" + encodeURIComponent(S.boxId);
  const qrImg = await loadImage("https://api.qrserver.com/v1/create-qr-code/?size=400x400&format=png&data=" + encodeURIComponent(qrUrl));

  for(let ci = 0; ci < copies; ci++){
    const col = copies === 4 ? ci % 2 : 0;
    const row = copies === 4 ? Math.floor(ci / 2) : ci;
    const ox = PAD + col * (LW + MARGIN);
    const oy = PAD + row * (LH + MARGIN);
    drawLabelOnCanvas(ctx, ox, oy, LW, LH, qrImg);
  }

  return cv.toDataURL("image/png");
}

// Draw one 4×6 portrait label at (ox, oy) with dimensions LW × LH.
// Pure black-and-white output — matches Nelko PL70e thermal printer.
function drawLabelOnCanvas(ctx, ox, oy, LW, LH, qrImg){
  const t = TIER[S.tier] || TIER.A;
  const active = S.items.filter((_,i)=>!S.removed.includes(i));
  const isItem = S.mode === "item";

  // Clear label area (white)
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(ox, oy, LW, LH);

  // Thin label border
  ctx.strokeStyle = "#000000";
  ctx.lineWidth = 2;
  ctx.strokeRect(ox+1, oy+1, LW-2, LH-2);

  const PAD = 28; // inner content padding
  let y = oy + PAD + 10; // running y cursor

  // ── HEADER ROW ────────────────────────────────────────────
  // Right: tier badge (solid black box, white text) — grown to 300×230
  const tbW = 300, tbH = 230;
  const tbX = ox + LW - PAD - tbW;
  const tbY = y + 6;
  ctx.fillStyle = "#000000";
  ctx.fillRect(tbX, tbY, tbW, tbH);
  ctx.fillStyle = "#ffffff";
  ctx.font = "700 170px Inter, Arial, sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(S.tier, tbX + tbW/2, tbY + 168);
  ctx.font = "500 26px Inter, Arial, sans-serif";
  ctx.fillText(t.sub1, tbX + tbW/2, tbY + 200);
  ctx.fillText(t.sub2, tbX + tbW/2, tbY + 224);
  ctx.textAlign = "left";

  // Left: "BOX" tag + big number, CENTERED in the space between left edge and tier badge
  // Available left column: from (ox + PAD) to (tbX - 12), so center = midpoint
  const leftColCenter = (ox + PAD + tbX - 12) / 2;
  ctx.fillStyle = "#555555";
  ctx.font = "500 26px Inter, Arial, sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("BOX", leftColCenter, y + 34);
  ctx.fillStyle = "#000000";
  ctx.font = "700 190px Inter, Arial, sans-serif";
  // Vertically align box number with the tier letter visual centre
  ctx.fillText(S.boxId, leftColCenter, y + 188);
  ctx.textAlign = "left";

  y += 258;

  // ── SUMMARY (bold, centered) ─────────────────────────────
  ctx.fillStyle = "#000000";
  ctx.font = "700 54px Inter, Arial, sans-serif";
  ctx.textAlign = "center";
  const summary = S.shortSummary || S.desc || "—";
  fillTextWrapped(ctx, summary, ox + LW/2, y + 42, LW - PAD*2 - 40, 60, 1);
  y += 78;
  ctx.textAlign = "left";

  // ── PACKED FROM BAND (solid black, white text) ───────────
  const bandH = 56;
  ctx.fillStyle = "#000000";
  ctx.fillRect(ox + PAD, y, LW - PAD*2, bandH);
  ctx.fillStyle = "#ffffff";
  ctx.font = "500 32px Inter, Arial, sans-serif";
  ctx.textAlign = "center";
  const originText = [S.originHome, S.originRoom].filter(Boolean).join(" · ").toUpperCase() || "—";
  fillTextWrapped(ctx, originText, ox + LW/2, y + 38, LW - PAD*2 - 20, 36, 1);
  ctx.textAlign = "left";
  y += bandH + 22;

  // ── FRAGILE STRIPE (conditional) ─────────────────────────
  if(S.fragile){
    const stH = 76;
    const stX = ox + PAD;
    const stW = LW - PAD*2;
    // Outer border
    ctx.strokeStyle = "#000000";
    ctx.lineWidth = 4;
    ctx.strokeRect(stX+2, y+2, stW-4, stH-4);

    // Hatched flanks
    const flankW = 100;
    drawHatchRect(ctx, stX+2, y+2, flankW, stH-4);
    drawHatchRect(ctx, stX+stW-flankW-2, y+2, flankW, stH-4);

    // Triangle icons in white circles
    drawCautionIcon(ctx, stX + flankW/2, y + stH/2, 32);
    drawCautionIcon(ctx, stX + stW - flankW/2, y + stH/2, 32);

    // FRAGILE + HANDLE WITH CARE centered between flanks
    ctx.fillStyle = "#000000";
    ctx.textAlign = "center";
    ctx.font = "700 36px Inter, Arial, sans-serif";
    ctx.fillText("FRAGILE", stX + stW/2, y + 36);
    ctx.font = "400 20px Inter, Arial, sans-serif";
    ctx.fillText("HANDLE WITH CARE", stX + stW/2, y + 62);
    ctx.textAlign = "left";
    y += stH + 16;
  }

  // ── CONTENTS ─────────────────────────────────────────────
  ctx.fillStyle = "#555555";
  ctx.font = "500 24px Inter, Arial, sans-serif";
  const contentsLabel = "CONTENTS (" + (isItem ? 1 : active.length) + " ITEM" + ((isItem?1:active.length)===1?"":"S") + ")";
  ctx.fillText(contentsLabel, ox + PAD, y + 22);
  y += 38;

  // Two columns — up to 8 items (4 per col)
  const MAX_SHOW = 8;
  const itemsToShow = isItem ? [S.singleCategory || "Item"] : active.slice(0, MAX_SHOW).map(String);
  const extra = isItem ? 0 : Math.max(0, active.length - MAX_SHOW);
  if(extra > 0) itemsToShow.push("+" + extra + " more items");
  const colW = (LW - PAD*2 - 30) / 2;
  const colX1 = ox + PAD;
  const colX2 = ox + PAD + colW + 30;
  const rowH = 40;
  ctx.fillStyle = "#000000";
  ctx.font = "400 30px Inter, Arial, sans-serif";
  const half = Math.ceil(itemsToShow.length / 2);
  const contentsStartY = y + 32;
  for(let i = 0; i < itemsToShow.length; i++){
    const inLeft = i < half;
    const colX = inLeft ? colX1 : colX2;
    const rIdx = inLeft ? i : (i - half);
    const text = "· " + itemsToShow[i];
    const maxW = colW;
    ctx.fillText(truncateText(ctx, text, maxW), colX, contentsStartY + rIdx * rowH);
  }
  y = contentsStartY + half * rowH + 12;

  // ── SIZE / WEIGHT ROW ────────────────────────────────────
  ctx.strokeStyle = "#000000";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(ox + PAD, y);
  ctx.lineTo(ox + LW - PAD, y);
  ctx.stroke();

  const sizeDisplay = (S.boxSize || "Medium").toUpperCase();
  const weightDisplay = S.weightKg != null ? (Number(S.weightKg).toFixed(1) + " kg") : "—";
  ctx.fillStyle = "#555555";
  ctx.font = "500 24px Inter, Arial, sans-serif";
  ctx.fillText("SIZE", ox + PAD, y + 36);
  ctx.fillStyle = "#000000";
  ctx.font = "700 32px Inter, Arial, sans-serif";
  ctx.fillText(isItem ? "—" : sizeDisplay, ox + PAD + 70, y + 36);

  ctx.fillStyle = "#555555";
  ctx.font = "500 24px Inter, Arial, sans-serif";
  ctx.textAlign = "right";
  ctx.fillText("WEIGHT", ox + LW - PAD - 140, y + 36);
  ctx.fillStyle = "#000000";
  ctx.font = "700 34px Inter, Arial, sans-serif";
  ctx.fillText(weightDisplay, ox + LW - PAD, y + 36);
  ctx.textAlign = "left";
  y += 62;

  // ── QR + PACKED BY ───────────────────────────────────────
  ctx.strokeStyle = "#000000";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(ox + PAD, y);
  ctx.lineTo(ox + LW - PAD, y);
  ctx.stroke();

  // QR on left — grown to 220
  const QR_SIZE = 220;
  if(qrImg) ctx.drawImage(qrImg, ox + PAD, y + 18, QR_SIZE, QR_SIZE);
  else {
    ctx.strokeStyle = "#cccccc";
    ctx.strokeRect(ox + PAD, y + 18, QR_SIZE, QR_SIZE);
  }

  // Packed-by on right (includes Belongs to line if owners set)
  const ownersText = (S.owners && S.owners.length) ? S.owners.join(" · ") : "";
  ctx.textAlign = "right";
  let rightY = y + 30;
  if(ownersText){
    ctx.fillStyle = "#555555";
    ctx.font = "400 22px Inter, Arial, sans-serif";
    ctx.fillText("Belongs to", ox + LW - PAD, rightY);
    rightY += 32;
    ctx.fillStyle = "#000000";
    ctx.font = "700 26px Inter, Arial, sans-serif";
    // Truncate if too wide to fit within the right column
    const maxRightW = LW - PAD*2 - QR_SIZE - 40;
    ctx.fillText(truncateText(ctx, ownersText, maxRightW), ox + LW - PAD, rightY);
    rightY += 32;
  }
  ctx.fillStyle = "#555555";
  ctx.font = "400 24px Inter, Arial, sans-serif";
  ctx.fillText("Packed by", ox + LW - PAD, rightY);
  rightY += 34;
  ctx.fillStyle = "#000000";
  ctx.font = "700 30px Inter, Arial, sans-serif";
  ctx.fillText(S.packedBy || "—", ox + LW - PAD, rightY);
  rightY += 32;
  ctx.fillStyle = "#555555";
  ctx.font = "400 20px Inter, Arial, sans-serif";
  ctx.fillText(formatTimestamp(S.packedAt) || "—", ox + LW - PAD, rightY);
  ctx.textAlign = "left";
  y += QR_SIZE + 30;

  // ── DELIVER TO footer ────────────────────────────────────
  ctx.fillStyle = "#555555";
  ctx.font = "500 22px Inter, Arial, sans-serif";
  ctx.fillText("DELIVER TO", ox + PAD, y + 22);
  ctx.fillStyle = "#000000";
  ctx.font = "400 22px Inter, Arial, sans-serif";
  ctx.fillText(
    DELIVER_TO.name + " · " + DELIVER_TO.addr1 + " · " + DELIVER_TO.addr2,
    ox + PAD, y + 52
  );
}

// Wraps text into up to `maxLines` lines, centered at x. Appends "…" if truncated.
function fillTextWrapped(ctx, text, x, y, maxWidth, lineHeight, maxLines){
  const words = String(text).split(/\s+/);
  const lines = [];
  let current = "";
  let didTruncate = false;
  for(let i = 0; i < words.length; i++){
    const w = words[i];
    const trial = current ? current + " " + w : w;
    if(ctx.measureText(trial).width > maxWidth && current){
      // Line full — start a new one
      if(lines.length + 1 >= maxLines){
        // Can't start another line without exceeding maxLines.
        // Finalize `current` and mark truncation.
        lines.push(current);
        didTruncate = i < words.length; // more words left
        current = "";
        break;
      }
      lines.push(current);
      current = w;
    } else {
      current = trial;
    }
  }
  if(current) lines.push(current);
  if(didTruncate && lines.length > 0){
    let last = lines[lines.length-1];
    while(ctx.measureText(last + "…").width > maxWidth && last.length > 1){
      last = last.slice(0, -1);
    }
    lines[lines.length-1] = last + "…";
  }
  lines.forEach((ln, i) => ctx.fillText(ln, x, y + i * lineHeight));
}

// Truncate a single line of text to fit maxWidth, appending "…" if cut.
function truncateText(ctx, text, maxWidth){
  if(ctx.measureText(text).width <= maxWidth) return text;
  let t = text;
  while(t.length > 1 && ctx.measureText(t + "…").width > maxWidth){
    t = t.slice(0, -1);
  }
  return t + "…";
}

// Draw a hatched rectangle (45° black stripes alternating with white).
function drawHatchRect(ctx, x, y, w, h){
  ctx.save();
  ctx.beginPath();
  ctx.rect(x, y, w, h);
  ctx.clip();
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = "#000000";
  ctx.lineWidth = 8;
  const step = 16;
  for(let i = -h; i < w + h; i += step){
    ctx.beginPath();
    ctx.moveTo(x + i, y);
    ctx.lineTo(x + i + h, y + h);
    ctx.stroke();
  }
  ctx.restore();
}

// Draw a caution triangle icon centered on (cx, cy) with approx radius r.
function drawCautionIcon(ctx, cx, cy, r){
  // White circle behind the triangle
  ctx.fillStyle = "#ffffff";
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();
  // Triangle
  ctx.fillStyle = "#000000";
  ctx.beginPath();
  ctx.moveTo(cx, cy - r*0.55);
  ctx.lineTo(cx + r*0.65, cy + r*0.5);
  ctx.lineTo(cx - r*0.65, cy + r*0.5);
  ctx.closePath();
  ctx.fill();
  // Exclamation mark (white)
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(cx - 2, cy - r*0.2, 4, r*0.45);
  ctx.fillRect(cx - 2, cy + r*0.3, 4, 5);
}

function loadImage(src){
  return new Promise(resolve=>{
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

      ${idx>0?`<button onclick="closeLightbox();openLightbox(${idx-1})" style="padding:8px 18px;border-radius:8px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:14px;cursor:pointer;font-family:inherit">← Prev</button>`:""}
      <button onclick="closeLightbox()" style="padding:8px 18px;border-radius:8px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:14px;cursor:pointer;font-family:inherit">Close</button>
      ${idx<S.photos.length-1?`<button onclick="closeLightbox();openLightbox(${idx+1})" style="padding:8px 18px;border-radius:8px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:14px;cursor:pointer;font-family:inherit">Next →</button>`:""}
    </div>
  `;
  label.addEventListener("click", e=>{ if(e.target===label) closeLightbox(); });
  document.body.appendChild(label);
}
function closeLightbox(){
  const el=document.getElementById("lightbox-overlay");
  if(el)el.remove();
}

/* ── Next box — preserves session-level defaults (home, room, size, packedBy, mode, tier) ── */
function nextBox(){
  clearSession(); // v20.1: previous box saved OK, don't resume it
  S = {
    ...S,
    step:0,
    // Preserved: mode, tier, packedBy, originHome, originRoom, boxSize, originRoomsByHome
    dest:"", desc:"", shortSummary:"", fragile:false,
    photos:[], items:[], removed:[],
    itemCategories:{}, itemValues:{}, itemValueSources:{},
    singleValue:0, singleValueSource:"", singleCategory:"Household", singleDimensions:"",
    clarifications:[], clarifyIdx:0,
    boxId:"", boxNumber:null, packedAt:null,
    sheetResult:"", editingItem:null, driveFolderUrl:"", driveError:"",
    weightKg:null,
    owners:[], // v20.1: owners are per-box, not session-level
  };
  r();
}

/* ── Toast ── */
function toast(msg){
  let t=document.getElementById("toast");
  if(!t){t=document.createElement("div");t.id="toast";t.style.cssText="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#222;color:#fff;font-size:13px;padding:10px 20px;border-radius:20px;z-index:999;transition:opacity .3s;pointer-events:none";document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity="1";clearTimeout(t._to);t._to=setTimeout(()=>t.style.opacity="0",2500);
}

// v20.1: restore session if user was mid-flow when app was backgrounded
const savedSession = loadSession();
if(savedSession && savedSession.screen === "pack" &&
   typeof savedSession.step === "number" && savedSession.step >= 0 && savedSession.step <= 2){
  // Only restore if there's meaningful progress (some data or past step 0)
  const hasProgress = savedSession.step > 0 || savedSession.desc || savedSession.shortSummary ||
                      (savedSession.photos && savedSession.photos.length) ||
                      (savedSession.items && savedSession.items.length) ||
                      savedSession.originRoom;
  if(hasProgress){
    // Merge saved state on top of initial defaults (so any new fields added later still exist)
    const photosLost = savedSession._photosLost;
    delete savedSession._photosLost;
    Object.assign(S, savedSession);
    // Show a short toast after first render so user knows we resumed them
    setTimeout(() => {
      toast(photosLost ? "Resumed — photos had to be dropped, please re-add" : "Resumed previous box");
    }, 200);
  }
}

r();
loadRegistryFromSupabase();
loadOriginRooms();
</script>
